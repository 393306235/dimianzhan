<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>CAAC 地面站工具 · 移动版</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #2d2d2d;
            --entry: #3c3c3c;
            --fg: #f0f0f0;
            --accent: #0078d7;
            --btn-bg: #3c3c3c;
            --btn-fg: #f0f0f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation; /* 禁止双击缩放 */
        }
        /* 桌面端布局 */
        #desktop-layout {
            display: flex;
            height: 100%;
        }
        #left-panel {
            width: 380px;
            background: var(--panel);
            padding: 10px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #444;
            overflow-y: auto;
        }
        #left-panel h2 { font-size: 1.2rem; margin-bottom: 10px; color: var(--accent); }
        .group {
            background: #252525;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .group label { display: block; margin-bottom: 4px; font-size: 0.9rem; }
        button, select, input[type="number"], input[type="text"] {
            background: var(--btn-bg);
            color: var(--btn-fg);
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            min-height: 44px; /* 移动端友好 */
        }
        button:hover { background: var(--accent); }
        .row { display: flex; align-items: center; gap: 5px; margin: 6px 0; flex-wrap: wrap; }
        #canvas-container {
            flex: 1;
            position: relative;
            background: white;
            display: flex;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none; /* 由JS处理手势 */
        }
        #status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 32px;
            background: #2d2d2d;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            border-top: 1px solid #444;
            z-index: 10;
        }
        /* 移动端工具栏 */
        #mobile-toolbar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--panel);
            padding: 8px;
            border-top: 1px solid #555;
            z-index: 20;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #mobile-toolbar button, #mobile-toolbar select {
            min-height: 40px;
            font-size: 0.8rem;
            padding: 6px 10px;
        }
        #menu-overlay {
            display: none;
            position: fixed;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            left: 0; top: 0; right: 0; bottom: 0;
        }
        #menu-content {
            background: var(--panel);
            margin: 20% auto;
            width: 85%;
            max-height: 60%;
            overflow-y: auto;
            border-radius: 8px;
            padding: 15px;
        }
        #menu-content .row { margin: 12px 0; }
        /* 媒体查询：手机屏幕 */
        @media (max-width: 768px) {
            #desktop-layout { display: none; }
            #canvas-container {
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 50px; /* 底部留工具栏 */
            }
            #mobile-toolbar { display: flex; }
            #status-bar { bottom: 50px; height: 28px; font-size: 0.75rem; }
        }
        /* 媒体查询：桌面 */
        @media (min-width: 769px) {
            #mobile-toolbar { display: none; }
            #desktop-layout { display: flex; }
        }
    </style>
</head>
<body>
<!-- 桌面布局 -->
<div id="desktop-layout">
    <div id="left-panel">
        <h2>操作</h2>
        <div class="group">
            <button onclick="openRelativeDialog()">相对坐标编辑器</button>
            <button onclick="resetView()">重置视图</button>
            <button onclick="deleteSelectedWaypoint()">删除选中航点</button>
            <button onclick="clearAllWaypoints()">删除所有航点</button>
            <label class="checkbox-label">
                <input type="checkbox" id="autoCloseCheck" onchange="toggleAutoClose()"> 自动闭合航线
            </label>
        </div>
        <div class="group">
            <h3>航线旋转</h3>
            <div class="row">
                <label>起始点:</label>
                <select id="rotateStart"></select>
                <label>终点:</label>
                <select id="rotateEnd"></select>
            </div>
            <div class="row">
                <label>目标航向(°):</label>
                <input type="number" id="rotateTarget" value="0">
                <button onclick="rotateRoute()">旋转</button>
            </div>
        </div>
        <div class="group">
            <h3>辅助工具</h3>
            <button onclick="clearAllCircles()">清空所有圆</button>
            <div id="circleList" style="height:100px; overflow-y:auto; border:1px solid #555; margin:4px 0; padding:2px;"></div>
            <button onclick="deleteSelectedCircle()">删除选中圆</button>
            <label class="checkbox-label">
                <input type="checkbox" id="showIntersectionsCheck" onchange="refreshCanvas()"> 显示交点 (单击添加)
            </label>
        </div>
        <div style="font-size:0.8rem; color:gray; margin-top:8px;">
            Shift+双击画布添加辅助点<br>
            右击航点添加辅助方向线<br>
            点击线段选中（红/黄），状态栏显示夹角，单击状态栏修改
        </div>
    </div>
    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
        <div id="status-bar" onclick="modifySelectedAngle()">就绪</div>
    </div>
</div>

<!-- 移动端工具栏 -->
<div id="mobile-toolbar">
    <button onclick="openRelativeDialog()">相对坐标</button>
    <button onclick="resetView()">重置</button>
    <button onclick="deleteSelectedWaypoint()">删航点</button>
    <button onclick="clearAllWaypoints()">清空</button>
    <button onclick="showAuxMenu()">辅助工具</button>
    <button onclick="rotateRoute()">旋转</button>
    <select id="mobileRotateStart"></select>
    <select id="mobileRotateEnd"></select>
    <input type="number" id="mobileRotateTarget" value="0" style="width:60px;">
    <label class="checkbox-label">
        <input type="checkbox" id="mobileShowIntersections" onchange="refreshCanvas()"> 交点
    </label>
</div>

<!-- 移动端辅助菜单 -->
<div id="aux-menu-overlay" style="display:none; position:fixed; z-index:2000; background:rgba(0,0,0,0.6); left:0;top:0;right:0;bottom:0;" onclick="closeAuxMenu()">
    <div style="background:#2d2d2d; margin:40% auto; width:80%; border-radius:8px; padding:15px;" onclick="event.stopPropagation()">
        <button onclick="clearAllCircles()">清空所有圆</button>
        <button onclick="deleteSelectedCircle()">删除选中圆</button>
        <button onclick="document.getElementById('mobileShowIntersections').click()">切换交点显示</button>
        <div id="mobileCircleList" style="height:80px; overflow-y:auto; border:1px solid #555; margin:4px 0;"></div>
        <button onclick="closeAuxMenu()">关闭</button>
    </div>
</div>

<!-- 相对坐标弹窗 -->
<div id="relativeModal" class="modal">
    <h3>相对坐标编辑器</h3>
    <div class="row">
        <label>基准点:</label>
        <select id="basePointSelect"></select>
    </div>
    <div class="row">
        <label>方位角(°):</label>
        <input type="number" id="relAzimuth" value="0">
    </div>
    <div class="row">
        <label>距离(米):</label>
        <input type="number" id="relDistance" value="100">
    </div>
    <div class="row">
        <label>新标签:</label>
        <input type="text" id="relLabel" value="">
    </div>
    <button onclick="addWaypointByRelative()">添加航点</button>
    <button onclick="closeRelativeDialog()">关闭</button>
</div>

<script>
    // ==================== 全局状态 ====================
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const statusBar = document.getElementById('status-bar');
    const isMobile = window.matchMedia('(max-width: 768px)').matches;

    let waypoints = [];
    let selectedWaypointIndex = null;
    let auxPoints = [];
    let auxConnections = new Map();
    let auxCircles = [];
    let auxDirLines = [];
    let scale = 1.0;
    let panOffset = [0, 0];
    let draggingWaypoint = null;
    let draggingAux = null;
    let panning = false;
    let panStart = null;
    let autoClose = false;
    let selectedEdges = [];
    let showIntersections = false;
    let dirtyIntersections = true;
    let intersectionsCache = [];
    let history = [];
    let historyIndex = -1;
    let selectedAuxIndices = [];
    let touchMode = false;       // 是否触摸操作中
    let initialPinchDist = 0;    // 双指初始距离
    let initialScale = 1;
    let initialPan = [0,0];
    let pinchCenter = null;      // 缩放中心（屏幕坐标）

    // ==================== 工具函数 ====================
    function toRad(deg) { return deg * Math.PI / 180; }
    function toDeg(rad) { return rad * 180 / Math.PI; }
    function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
    function azimuth(x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (Math.abs(dx) < 1e-12 && Math.abs(dy) < 1e-12) return 0;
        return (toDeg(Math.atan2(dx, dy)) + 360) % 360;
    }
    function pointToSegmentDist(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (dx === 0 && dy === 0) return Math.hypot(px - x1, py - y1);
        const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
        return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
    }

    // ==================== 历史记录 ====================
    function saveState() {
        const state = JSON.parse(JSON.stringify(waypoints));
        if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1);
        history.push(state);
        historyIndex = history.length - 1;
        if (history.length > 50) { history.shift(); historyIndex--; }
        dirtyIntersections = true;
    }
    function undo() { /* 省略，按需添加 */ }
    function redo() { /* 省略 */ }

    // ==================== 坐标转换 ====================
    function worldToScreen(wx, wy) {
        return { x: wx * scale + panOffset[0], y: wy * scale + panOffset[1] };
    }
    function screenToWorld(sx, sy) {
        return { x: (sx - panOffset[0]) / scale, y: (sy - panOffset[1]) / scale };
    }

    // ==================== 航点操作 ====================
    function getNextLabel() {
        let maxNum = 0;
        waypoints.forEach(wp => { if (wp.label !== 'H') { const n = parseInt(wp.label); if (!isNaN(n) && n > maxNum) maxNum = n; } });
        return String(maxNum + 1);
    }
    function addWaypoint(x, y, label) {
        saveState();
        const hasH = waypoints.some(w => w.label === 'H');
        const has1 = waypoints.some(w => w.label === '1');
        if (!label) label = !hasH ? 'H' : (!has1 ? '1' : getNextLabel());
        waypoints.push({ x, y, label, params: {} });
        dirtyIntersections = true;
        refreshCanvas();
    }
    function deleteWaypoint(index) {
        if (index == null || index >= waypoints.length) return;
        if (waypoints[index].label === 'H' && confirm('删除H点将清空所有航点，确定？')) { clearAllWaypoints(); return; }
        saveState();
        waypoints.splice(index, 1);
        selectedWaypointIndex = null;
        refreshCanvas();
    }
    function clearAllWaypoints() {
        if (waypoints.length === 0 || !confirm('确定清空所有航点？')) return;
        saveState();
        waypoints = [];
        selectedWaypointIndex = null;
        refreshCanvas();
    }
    function deleteSelectedWaypoint() { deleteWaypoint(selectedWaypointIndex); }
    function toggleAutoClose() { autoClose = document.getElementById('autoCloseCheck').checked; refreshCanvas(); }

    // ==================== 辅助点/圆/方向线 ====================
    function addAuxPoint(x, y) {
        const label = `A${auxPoints.length + 1}`;
        auxPoints.push({ x, y, label });
        auxConnections.set(auxPoints.length - 1, new Set());
        dirtyIntersections = true;
        refreshCanvas();
    }
    function getNearbyAux(wx, wy) {
        const th = 20 / scale;
        for (let i = 0; i < auxPoints.length; i++) if (dist(wx, wy, auxPoints[i].x, auxPoints[i].y) <= th) return i;
        return -1;
    }
    function updateAuxConnections() {
        const th = 20 / scale;
        auxPoints.forEach((ap, idx) => {
            const conn = auxConnections.get(idx) || new Set();
            waypoints.forEach(wp => { if (!conn.has(wp.label) && dist(ap.x, ap.y, wp.x, wp.y) <= th) conn.add(wp.label); });
            auxConnections.set(idx, conn);
        });
        dirtyIntersections = true;
    }
    function addCircleForVertex(index) {
        const radius = prompt('输入半径（米）:', '100');
        if (radius && !isNaN(radius) && radius > 0) {
            auxCircles.push({ centerType: 'vertex', centerRef: waypoints[index].label, radius: parseFloat(radius) });
            dirtyIntersections = true; refreshCanvas();
        }
    }
    function addCircleForAux(index) {
        const radius = prompt('输入半径（米）:', '100');
        if (radius && !isNaN(radius) && radius > 0) {
            auxCircles.push({ centerType: 'aux', centerRef: index, radius: parseFloat(radius) });
            dirtyIntersections = true; refreshCanvas();
        }
    }
    function clearAllCircles() { auxCircles = []; dirtyIntersections = true; refreshCanvas(); }
    function deleteSelectedCircle() { /* 简化：删除最后一个 */ auxCircles.pop(); dirtyIntersections = true; refreshCanvas(); }
    function addDirectionLine(index) {
        const angle = prompt('输入方向角度（0-360°）:', '315');
        if (angle !== null && !isNaN(angle)) {
            auxDirLines.push({ vertexLabel: waypoints[index].label, angle: parseFloat(angle) });
            dirtyIntersections = true; refreshCanvas();
        }
    }

    // ==================== 绘图 ====================
    function refreshCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        drawCanvas();
        updateRotateCombos();
        updateCircleListbox();
    }
    function drawCanvas() {
        const cw = canvas.width, ch = canvas.height;
        ctx.clearRect(0, 0, cw, ch);
        ctx.fillStyle = 'white'; ctx.fillRect(0, 0, cw, ch);
        // 网格
        ctx.strokeStyle = '#d0d0d0'; ctx.lineWidth = 1;
        const gs = 50 * scale, ox = panOffset[0] % gs, oy = panOffset[1] % gs;
        for (let x = ox; x < cw; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke(); }
        for (let y = oy; y < ch; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke(); }
        // 罗盘
        const r = 60, cxr = cw - r - 20, cyr = ch - r - 60;
        ctx.strokeStyle = '#7f8c8d'; ctx.beginPath(); ctx.arc(cxr, cyr, r, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr - r, cyr); ctx.lineTo(cxr + r, cyr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr, cyr - r); ctx.lineTo(cxr, cyr + r); ctx.stroke();
        // 航线
        const edges = getAllEdges();
        edges.forEach(({i1, i2}) => {
            const sp1 = worldToScreen(waypoints[i1].x, waypoints[i1].y);
            const sp2 = worldToScreen(waypoints[i2].x, waypoints[i2].y);
            let color = '#2980b9';
            if (selectedEdges.length >= 1 && ((selectedEdges[0].i1 === i1 && selectedEdges[0].i2 === i2) || (selectedEdges[0].i1 === i2 && selectedEdges[0].i2 === i1))) color = '#e74c3c';
            else if (selectedEdges.length >= 2 && ((selectedEdges[1].i1 === i1 && selectedEdges[1].i2 === i2) || (selectedEdges[1].i1 === i2 && selectedEdges[1].i2 === i1))) color = '#f1c40f';
            ctx.strokeStyle = color; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(sp1.x, sp1.y); ctx.lineTo(sp2.x, sp2.y); ctx.stroke();
        });
        // 航点
        waypoints.forEach((wp, i) => {
            const sp = worldToScreen(wp.x, wp.y);
            ctx.fillStyle = wp.label === 'H' ? '#e74c3c' : (i === selectedWaypointIndex ? '#f39c12' : '#3498db');
            ctx.beginPath(); ctx.arc(sp.x, sp.y, (wp.label === 'H' || i === selectedWaypointIndex) ? 12 : 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 12px Microsoft YaHei'; ctx.textAlign = 'center';
            ctx.fillText(wp.label, sp.x, sp.y - 15);
        });
        // 辅助方向线
        auxDirLines.forEach(dl => {
            const wp = waypoints.find(w => w.label === dl.vertexLabel);
            if (!wp) return;
            const sp = worldToScreen(wp.x, wp.y);
            const rad = toRad(90 - dl.angle);
            const ep = worldToScreen(wp.x + 1e6 * Math.cos(rad), wp.y - 1e6 * Math.sin(rad));
            ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
            ctx.beginPath(); ctx.moveTo(sp.x, sp.y); ctx.lineTo(ep.x, ep.y); ctx.stroke();
            ctx.setLineDash([]);
        });
        // 辅助圆
        auxCircles.forEach(c => {
            let center = c.centerType === 'vertex' ? waypoints.find(w => w.label === c.centerRef) : auxPoints[c.centerRef];
            if (!center) return;
            const sp = worldToScreen(center.x, center.y), rp = c.radius * scale;
            ctx.strokeStyle = 'green'; ctx.lineWidth = 2; ctx.setLineDash([4, 2]);
            ctx.beginPath(); ctx.arc(sp.x, sp.y, rp, 0, Math.PI * 2); ctx.stroke();
            ctx.setLineDash([]); ctx.fillStyle = 'green'; ctx.font = 'bold 9px Arial'; ctx.fillText(`${Math.round(c.radius)}m`, sp.x, sp.y);
        });
        // 交点
        if (showIntersections) {
            if (dirtyIntersections) { intersectionsCache = computeAllIntersections(); dirtyIntersections = false; }
            intersectionsCache.forEach(pt => {
                const sp = worldToScreen(pt.x, pt.y);
                ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(sp.x - 5, sp.y); ctx.lineTo(sp.x + 5, sp.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(sp.x, sp.y - 5); ctx.lineTo(sp.x, sp.y + 5); ctx.stroke();
            });
        }
        // 辅助点
        auxPoints.forEach((ap, idx) => {
            const sp = worldToScreen(ap.x, ap.y);
            ctx.fillStyle = '#9400d3'; ctx.beginPath(); ctx.arc(sp.x, sp.y, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#adff2f'; ctx.font = 'bold 8px Arial'; ctx.fillText(ap.label, sp.x + 10, sp.y - 8);
        });
        // 状态
        if (selectedEdges.length === 2) statusBar.textContent = `夹角 ${calcSelectedAngle().toFixed(1)}° (点击修改)`;
        else statusBar.textContent = '就绪';
    }

    function getAllEdges() {
        const e = [];
        if (waypoints.length >= 2) {
            for (let i = 0; i < waypoints.length - 1; i++) e.push({ i1: i, i2: i + 1 });
            if (autoClose && waypoints.length >= 3) e.push({ i1: waypoints.length - 1, i2: 0 });
        }
        return e;
    }
    function calcSelectedAngle() {
        if (selectedEdges.length !== 2) return 0;
        const [e1, e2] = selectedEdges;
        let common = null;
        if (e1.i1 === e2.i1 || e1.i1 === e2.i2) common = e1.i1;
        else if (e1.i2 === e2.i1 || e1.i2 === e2.i2) common = e1.i2;
        if (common == null) return 0;
        const other1 = (common === e1.i1) ? waypoints[e1.i2] : waypoints[e1.i1];
        const other2 = (common === e2.i1) ? waypoints[e2.i2] : waypoints[e2.i1];
        return calcAngleAtVertex(other1, waypoints[common], other2);
    }
    function calcAngleAtVertex(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y }, v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y;
        const m1 = Math.hypot(v1.x, v1.y), m2 = Math.hypot(v2.x, v2.y);
        if (m1 === 0 || m2 === 0) return 0;
        return toDeg(Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))));
    }

    // ==================== 事件处理（含触摸） ====================
    function getEventPos(e) {
        const rect = canvas.getBoundingClientRect();
        if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }
    function handleDown(e) {
        e.preventDefault();
        const pos = getEventPos(e);
        const wp = screenToWorld(pos.x, pos.y);
        // 辅助点
        const auxIdx = getNearbyAux(wp.x, wp.y);
        if (auxIdx >= 0) { draggingAux = auxIdx; return; }
        // 航点
        for (let i = 0; i < waypoints.length; i++) {
            if (dist(wp.x, wp.y, waypoints[i].x, waypoints[i].y) <= 15 / scale) {
                draggingWaypoint = i; selectedWaypointIndex = i; refreshCanvas(); return;
            }
        }
        // 线段
        const edges = getAllEdges();
        for (const e of edges) {
            if (pointToSegmentDist(wp.x, wp.y, waypoints[e.i1].x, waypoints[e.i1].y, waypoints[e.i2].x, waypoints[e.i2].y) <= edgeThreshold / scale) {
                const exists = selectedEdges.findIndex(se => (se.i1 === e.i1 && se.i2 === e.i2) || (se.i1 === e.i2 && se.i2 === e.i1));
                if (exists >= 0) selectedEdges.splice(exists, 1);
                else { if (selectedEdges.length >= 2) selectedEdges.shift(); selectedEdges.push(e); }
                refreshCanvas(); return;
            }
        }
        selectedEdges = [];
        // 交点吸附
        if (showIntersections) {
            if (dirtyIntersections) { intersectionsCache = computeAllIntersections(); dirtyIntersections = false; }
            let minDist = Infinity, closest = null;
            intersectionsCache.forEach(pt => { const d = dist(wp.x, wp.y, pt.x, pt.y); if (d < minDist) { minDist = d; closest = pt; } });
            if (closest && minDist <= 10 / scale) { addWaypoint(closest.x, closest.y); return; }
        }
        // 平移
        panning = true; panStart = { x: pos.x, y: pos.y };
    }
    function handleMove(e) {
        e.preventDefault();
        if (e.touches && e.touches.length === 2) {
            // 双指缩放
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const pinchDist = Math.hypot(dx, dy);
            if (initialPinchDist === 0) {
                initialPinchDist = pinchDist;
                initialScale = scale;
                initialPan = [...panOffset];
                pinchCenter = screenToWorld((e.touches[0].clientX + e.touches[1].clientX) / 2 - canvas.getBoundingClientRect().left,
                                           (e.touches[0].clientY + e.touches[1].clientY) / 2 - canvas.getBoundingClientRect().top);
                return;
            }
            const factor = pinchDist / initialPinchDist;
            const newScale = Math.max(0.1, Math.min(20, initialScale * factor));
            // 以pinchCenter为中心缩放
            const pc = worldToScreen(pinchCenter.x, pinchCenter.y);
            panOffset[0] = pc.x - pinchCenter.x * newScale;
            panOffset[1] = pc.y - pinchCenter.y * newScale;
            scale = newScale;
            refreshCanvas();
            return;
        }
        if (e.touches) { initialPinchDist = 0; } // 重置
        if (draggingWaypoint != null) {
            const pos = getEventPos(e);
            const wp = screenToWorld(pos.x, pos.y);
            waypoints[draggingWaypoint].x = wp.x; waypoints[draggingWaypoint].y = wp.y;
            updateAuxConnections(); refreshCanvas();
        } else if (draggingAux != null) {
            const pos = getEventPos(e);
            const wp = screenToWorld(pos.x, pos.y);
            auxPoints[draggingAux].x = wp.x; auxPoints[draggingAux].y = wp.y;
            updateAuxConnections(); refreshCanvas();
        } else if (panning && panStart) {
            const pos = getEventPos(e);
            const dx = pos.x - panStart.x, dy = pos.y - panStart.y;
            panOffset[0] += dx; panOffset[1] += dy;
            panStart = { x: pos.x, y: pos.y };
            refreshCanvas();
        }
    }
    function handleUp(e) {
        if (draggingWaypoint != null) { saveState(); draggingWaypoint = null; }
        if (draggingAux != null) draggingAux = null;
        panning = false; initialPinchDist = 0;
    }
    function handleWheel(e) {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = Math.max(0.1, Math.min(20, scale * factor));
        const rect = canvas.getBoundingClientRect();
        const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
        panOffset[0] = cx - (cx - panOffset[0]) * (newScale / scale);
        panOffset[1] = cy - (cy - panOffset[1]) * (newScale / scale);
        scale = newScale;
        refreshCanvas();
    }
    function handleDoubleClick(e) {
        const pos = getEventPos(e);
        const wp = screenToWorld(pos.x, pos.y);
        if (e.shiftKey) addAuxPoint(wp.x, wp.y);
        else addWaypoint(wp.x, wp.y);
    }
    function handleContextMenu(e) {
        e.preventDefault();
        const pos = getEventPos(e);
        const wp = screenToWorld(pos.x, pos.y);
        const auxIdx = getNearbyAux(wp.x, wp.y);
        if (auxIdx >= 0) {
            if (confirm(`删除辅助点 ${auxPoints[auxIdx].label}?`)) {
                auxPoints.splice(auxIdx, 1); auxConnections.delete(auxIdx); refreshCanvas();
            }
            return;
        }
        for (let i = 0; i < waypoints.length; i++) {
            if (dist(wp.x, wp.y, waypoints[i].x, waypoints[i].y) <= 15 / scale) {
                const action = prompt(`航点 ${waypoints[i].label}: 输入操作编号\n1-删除 2-辅助圆 3-方向线`, '');
                if (action === '1') deleteWaypoint(i);
                else if (action === '2') addCircleForVertex(i);
                else if (action === '3') addDirectionLine(i);
                break;
            }
        }
    }

    // 绑定事件
    canvas.addEventListener('mousedown', handleDown);
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('mouseup', handleUp);
    canvas.addEventListener('wheel', handleWheel, { passive: false });
    canvas.addEventListener('dblclick', handleDoubleClick);
    canvas.addEventListener('contextmenu', handleContextMenu);
    // 触摸事件
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleDown(e); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, { passive: false });
    canvas.addEventListener('touchend', handleUp);
    canvas.addEventListener('touchcancel', handleUp);

    // 窗口大小改变时重绘
    window.addEventListener('resize', () => { refreshCanvas(); });

    // 移动端工具栏同步
    document.getElementById('mobileRotateStart').addEventListener('change', function() { document.getElementById('rotateStart').value = this.value; });
    document.getElementById('mobileRotateEnd').addEventListener('change', function() { document.getElementById('rotateEnd').value = this.value; });
    document.getElementById('mobileRotateTarget').addEventListener('input', function() { document.getElementById('rotateTarget').value = this.value; });
    document.getElementById('mobileShowIntersections').addEventListener('change', function() {
        showIntersections = this.checked; document.getElementById('showIntersectionsCheck').checked = this.checked; refreshCanvas();
    });

    function showAuxMenu() { document.getElementById('aux-menu-overlay').style.display = 'block'; updateCircleListbox(); }
    function closeAuxMenu() { document.getElementById('aux-menu-overlay').style.display = 'none'; }

    function updateRotateCombos() {
        const labels = waypoints.map(w => w.label);
        ['rotateStart','rotateEnd','mobileRotateStart','mobileRotateEnd'].forEach(id => {
            const sel = document.getElementById(id);
            if (sel) { sel.innerHTML = labels.map(l => `<option>${l}</option>`).join(''); }
        });
    }
    function updateCircleListbox() {
        const list = document.getElementById('circleList');
        const mobileList = document.getElementById('mobileCircleList');
        const html = auxCircles.map((c, i) => `<div>${c.centerType === 'vertex' ? '顶点 '+c.centerRef : '辅助点 '+(auxPoints[c.centerRef]?.label||'')} R=${c.radius}m</div>`).join('');
        if (list) list.innerHTML = html;
        if (mobileList) mobileList.innerHTML = html;
    }

    function modifySelectedAngle() {
        if (selectedEdges.length !== 2) return;
        const ang = calcSelectedAngle();
        const newAng = prompt(`当前夹角 ${ang.toFixed(1)}°，输入新角度（0-180）：`, ang.toFixed(1));
        if (newAng === null || isNaN(newAng)) return;
        const target = parseFloat(newAng);
        // 旋转红边（先选的边）
        const [e1, e2] = selectedEdges;
        let common = null;
        if (e1.i1 === e2.i1 || e1.i1 === e2.i2) common = e1.i1;
        else if (e1.i2 === e2.i1 || e1.i2 === e2.i2) common = e1.i2;
        if (common == null) return;
        const redOther = (common === e1.i1) ? e1.i2 : e1.i1;
        const yellowOther = (common === e2.i1) ? e2.i2 : e2.i1;
        const pc = waypoints[common], py = waypoints[yellowOther], pr = waypoints[redOther];
        const vy = { x: py.x - pc.x, y: py.y - pc.y }, vr = { x: pr.x - pc.x, y: pr.y - pc.y };
        const ly = Math.hypot(vy.x, vy.y), lr = Math.hypot(vr.x, vr.y);
        if (ly === 0 || lr === 0) return;
        const dot = vy.x * vr.x + vy.y * vr.y, cross = vy.x * vr.y - vy.y * vr.x;
        const curRad = Math.atan2(cross, dot);
        const targetRad = (cross >= 0 ? 1 : -1) * toRad(target);
        const rot = targetRad - curRad;
        const cosR = Math.cos(rot), sinR = Math.sin(rot);
        const newVr = { x: vr.x * cosR - vr.y * sinR, y: vr.x * sinR + vr.y * cosR };
        const vlen = Math.hypot(newVr.x, newVr.y);
        if (vlen > 1e-12) { newVr.x *= lr / vlen; newVr.y *= lr / vlen; }
        saveState();
        waypoints[redOther].x = pc.x + newVr.x; waypoints[redOther].y = pc.y + newVr.y;
        refreshCanvas();
    }

    function rotateRoute() {
        const startLabel = document.getElementById('rotateStart').value;
        const endLabel = document.getElementById('rotateEnd').value;
        const target = parseFloat(document.getElementById('rotateTarget').value);
        if (isNaN(target)) return;
        const start = waypoints.find(w => w.label === startLabel);
        const end = waypoints.find(w => w.label === endLabel);
        if (!start || !end) return;
        const curAz = azimuth(start.x, start.y, end.x, end.y);
        const delta = target - curAz;
        const cx = start.x, cy = start.y;
        const rad = toRad(delta), cosA = Math.cos(rad), sinA = Math.sin(rad);
        saveState();
        waypoints.forEach(wp => { const dx = wp.x - cx, dy = wp.y - cy; wp.x = cx + dx * cosA - dy * sinA; wp.y = cy + dx * sinA + dy * cosA; });
        refreshCanvas();
    }

    function resetView() {
        if (waypoints.length === 0) { scale = 1; panOffset = [0, 0]; }
        else {
            const xs = waypoints.map(w => w.x), ys = waypoints.map(w => w.y);
            const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
            const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
            const w = maxX - minX + 100, h = maxY - minY + 100;
            scale = Math.min(canvas.clientWidth / w, canvas.clientHeight / h, 2.0);
            scale = Math.max(scale, 0.5);
            panOffset = [canvas.clientWidth / 2 - cx * scale, canvas.clientHeight / 2 - cy * scale];
        }
        refreshCanvas();
    }

    function openRelativeDialog() { document.getElementById('relativeModal').style.display = 'block'; updateBasePointCombo(); }
    function closeRelativeDialog() { document.getElementById('relativeModal').style.display = 'none'; }
    function updateBasePointCombo() { document.getElementById('basePointSelect').innerHTML = waypoints.map(w => `<option>${w.label}</option>`).join(''); }
    function addWaypointByRelative() {
        const baseLabel = document.getElementById('basePointSelect').value;
        const az = parseFloat(document.getElementById('relAzimuth').value);
        const distVal = parseFloat(document.getElementById('relDistance').value);
        const label = document.getElementById('relLabel').value || getNextLabel();
        const bp = waypoints.find(w => w.label === baseLabel);
        if (!bp || isNaN(az) || isNaN(distVal)) return;
        const rad = toRad(90 - az);
        const nx = bp.x + distVal * Math.cos(rad), ny = bp.y - distVal * Math.sin(rad);
        saveState();
        waypoints.push({ x: nx, y: ny, label, params: {} });
        closeRelativeDialog();
        refreshCanvas();
    }

    function computeAllIntersections() { /* 简化版，返回空数组，实际可补全 */ return []; }

    // 初始化
    saveState();
    refreshCanvas();
</script>
</body>
</html>
