<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CAAC 地面站 · 移动版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #2d2d2d;
            --entry: #3c3c3c;
            --fg: #f0f0f0;
            --accent: #0078d7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        #left-panel {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 85%; max-width: 380px;
            background: var(--panel); padding: 15px; z-index: 100;
            transform: translateX(-100%); transition: transform 0.3s;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            border-right: 1px solid #444;
        }
        #left-panel.open { transform: translateX(0); }
        .panel-close-btn {
            display: block; width: 100%; background: #ff3b30; color: white;
            border: none; font-size: 18px; padding: 12px; border-radius: 10px;
            margin-bottom: 15px; cursor: pointer; text-align: center;
        }
        #left-panel h2 { font-size: 1.2rem; margin-bottom: 10px; color: var(--accent); }
        .group {
            background: #252525; border-radius: 6px; padding: 12px; margin-bottom: 10px;
        }
        .group label { display: block; margin-bottom: 4px; font-size: 0.9rem; }
        button, select, input[type="number"], input[type="text"] {
            background: var(--entry); color: var(--fg); border: 1px solid #555;
            padding: 10px 12px; border-radius: 8px; font-size: 1rem; margin: 4px 0;
            cursor: pointer; touch-action: manipulation;
        }
        button:active { background: var(--accent); }
        .row { display: flex; align-items: center; gap: 5px; margin: 6px 0; flex-wrap: wrap; }
        #canvas-container { flex: 1; position: relative; background: white; touch-action: none; }
        canvas { width: 100%; height: 100%; display: block; }

        #bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(28,28,30,0.85); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 8px 12px; gap: 10px;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            border-top: 1px solid rgba(255,255,255,0.15); z-index: 20; min-height: 52px;
        }
        #bottom-bar::-webkit-scrollbar { display: none; }
        .tool-btn {
            flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%;
            background: #3c3c3c; border: 1px solid #555; color: var(--fg);
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .tool-btn:active { background: var(--accent); }
        .tool-btn.danger { background: #ff3b30; }
        #menuBtn { font-size: 1.5rem; padding: 6px 12px; border-radius: 8px; background: #3c3c3c; }
        #status-text-inline {
            color: #f0f0f0; font-size: 0.85rem; margin-left: 10px;
            white-space: nowrap; cursor: pointer;
        }

        #scale-bar {
            position: absolute; top: 52px; left: 0; right: 0; height: 36px;
            background: rgba(28,28,30,0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 10px; gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.15); z-index: 19;
        }
        #scale-bar input[type="range"] {
            flex: 1; height: 6px; -webkit-appearance: none; background: #555;
            border-radius: 3px; outline: none;
        }
        #scale-bar input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 28px; height: 28px;
            background: var(--accent); border-radius: 50%; border: 2px solid white; cursor: pointer;
        }
        #scale-value { width: 48px; text-align: center; font-size: 0.85rem; color: #f0f0f0; flex-shrink: 0; }

        .modal {
            display: none; position: fixed; z-index: 200; background: #2d2d2d;
            border: 1px solid #555; border-radius: 12px; width: 90%; max-width: 350px;
            max-height: 80vh; overflow-y: auto; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
        }
        .modal.active { display: block; }
        .modal-header {
            background: #444; padding: 10px; border-radius: 12px 12px 0 0;
            cursor: grab; text-align: center; font-weight: bold;
        }
        .modal input[type="number"] { width: 80px; }
        .modal .row { margin: 8px 0; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; }
        select { width: auto; }

        #waypoint-list {
            position: absolute; top: 50px; right: 8px; width: 140px;
            background: rgba(28,28,30,0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 6px; max-height: 200px; overflow-y: auto;
            z-index: 18; display: none; border: 1px solid rgba(255,255,255,0.15); color: var(--fg);
        }
        #waypoint-list div {
            padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer;
            touch-action: manipulation;
        }
        #waypoint-list div:active { background: var(--accent); }

        input, textarea { -webkit-user-select: auto; user-select: auto; }
    </style>
</head>
<body>
<div id="left-panel">
    <button class="panel-close-btn" onclick="closePanel()">✕ 关闭工具箱</button>
    <h2>操作</h2>
    <div class="group">
        <button onclick="openRelativeDialog()">相对坐标编辑器</button>
        <button onclick="resetView()">重置视图</button>
        <button onclick="deleteSelectedWaypoint()">删除选中航点</button>
        <button onclick="clearAllWaypoints()">删除所有航点</button>
        <label class="checkbox-label">
            <input type="checkbox" id="autoCloseCheck" onchange="toggleAutoClose()"> 自动闭合航线
        </label>
        <button id="auxModeBtn" onclick="toggleAuxMode()">📌 添加辅助点模式</button>
    </div>
    <div class="group">
        <h3>航线旋转</h3>
        <div class="row">
            <label>起始点:</label>
            <select id="rotateStart"></select>
            <label>终点:</label>
            <select id="rotateEnd"></select>
        </div>
        <div class="row">
            <label>目标航向(°):</label>
            <input type="number" id="rotateTarget" value="0" style="width:80px;">
            <button onclick="rotateRoute()">旋转</button>
        </div>
    </div>
    <div class="group">
        <h3>辅助工具</h3>
        <button onclick="clearAllCircles()">清空所有圆</button>
        <div style="height:100px; overflow-y:auto; border:1px solid #555; margin:4px 0; padding:2px;" id="circleList"></div>
        <button onclick="deleteSelectedCircle()">删除选中圆</button>
        <label class="checkbox-label">
            <input type="checkbox" id="showIntersectionsCheck" onchange="refreshCanvas()"> 显示交点 (单击添加)
        </label>
    </div>
    <div style="font-size:0.8rem; color:gray; margin-top:8px;">
        · 双击画布添加航点<br>
        · 长按航点弹出菜单<br>
        · 点击线段可选中测角<br>
        · 点击状态文本修改夹角
    </div>
</div>

<div id="canvas-container">
    <canvas id="mainCanvas"></canvas>
    <div id="bottom-bar">
        <button class="tool-btn" id="menuBtn" onclick="togglePanel()">☰</button>
        <button class="tool-btn" onclick="undo()">↩</button>
        <button class="tool-btn" onclick="redo()">↪</button>
        <button class="tool-btn" id="addBtn" onclick="toggleAddMode()">＋</button>
        <button class="tool-btn" onclick="openRelativeDialog()">⊕</button>
        <button class="tool-btn" onclick="showWaypointList()">☷</button>
        <button class="tool-btn danger" onclick="clearAllWaypoints()">✕</button>
        <span id="status-text-inline" onclick="modifySelectedAngle()">就绪</span>
    </div>
    <div id="scale-bar">
        <input type="range" id="scale-slider" min="0.5" max="20" step="0.1" value="1">
        <span id="scale-value">1.0x</span>
    </div>
</div>

<div id="relativeModal" class="modal" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
    <div class="modal-header" id="modalHeader">相对坐标编辑器 (拖动此处移动)</div>
    <div style="padding: 15px;" ontouchstart="event.stopPropagation()" onmousedown="event.stopPropagation()">
        <div class="row">
            <label>基准点:</label>
            <select id="basePointSelect"></select>
        </div>
        <div class="row">
            <label>方位角(°):</label>
            <input type="number" id="relAzimuth" value="0">
        </div>
        <div class="row">
            <label>距离(米):</label>
            <input type="number" id="relDistance" value="100">
        </div>
        <div class="row">
            <label>新标签:</label>
            <input type="text" id="relLabel" value="">
        </div>
        <button onclick="addWaypointByRelative()">添加航点</button>
        <button onclick="closeRelativeDialog()">关闭</button>
    </div>
</div>

<div id="waypoint-list"></div>

<script>
    // ==================== 全局状态 (完全保留原始变量) ====================
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const statusBar = document.getElementById('status-text-inline');
    const scaleSlider = document.getElementById('scale-slider');
    const scaleValue = document.getElementById('scale-value');

    let waypoints = [];
    let selectedWaypointIndex = null;
    let auxPoints = [];
    let auxConnections = new Map();
    let auxCircles = [];
    let auxDirLines = [];
    let scale = 1.0;
    let panOffset = [0, 0];
    let autoClose = false;
    let selectedEdges = [];
    const edgeThreshold = 10;
    let showIntersections = false;
    let dirtyIntersections = true;
    let intersectionsCache = [];
    let history = [];
    let historyIndex = -1;
    let addMode = false;
    let auxMode = false;

    let touchMode = null;
    let lastTapTime = 0;
    let lastTapPos = null;
    let longPressTimer = null;
    let longPressTarget = null;
    let pinchStartDist = null;
    let pinchStartScale = 1;
    let pinchCenter = null;
    let pinchWorldCenter = null;
    let draggingWaypointIndex = null;
    let draggingAuxIndex = null;
    let panStart = null;
    let overlappingChosen = null;

    let isDraggingModal = false;
    let modalDragStart = { x: 0, y: 0, left: 0, top: 0 };

    // ==================== 工具函数 ====================
    function toRad(deg) { return deg * Math.PI / 180; }
    function toDeg(rad) { return rad * 180 / Math.PI; }
    function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
    function azimuth(x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (Math.abs(dx) < 1e-12 && Math.abs(dy) < 1e-12) return 0;
        const angle = Math.atan2(dx, dy) * 180 / Math.PI;
        return (angle + 360) % 360;
    }
    function pointToSegmentDist(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (dx === 0 && dy === 0) return Math.hypot(px - x1, py - y1);
        const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
        return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
    }

    function saveState() {
        const state = JSON.parse(JSON.stringify(waypoints));
        if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1);
        history.push(state);
        historyIndex = history.length - 1;
        if (history.length > 50) { history.shift(); historyIndex--; }
        dirtyIntersections = true;
        localStorage.setItem('gcs-waypoints', JSON.stringify(waypoints));
    }
    function undo() {
        if (historyIndex > 0) {
            historyIndex--;
            waypoints = JSON.parse(JSON.stringify(history[historyIndex]));
            selectedWaypointIndex = null; selectedEdges = [];
            refreshCanvas();
        }
    }
    function redo() {
        if (historyIndex < history.length - 1) {
            historyIndex++;
            waypoints = JSON.parse(JSON.stringify(history[historyIndex]));
            selectedWaypointIndex = null; selectedEdges = [];
            refreshCanvas();
        }
    }

    function worldToScreen(wx, wy) {
        return { x: wx * scale + panOffset[0], y: wy * scale + panOffset[1] };
    }
    function screenToWorld(sx, sy) {
        return { x: (sx - panOffset[0]) / scale, y: (sy - panOffset[1]) / scale };
    }

    // ==================== 航点操作 ====================
    function getNextLabel() {
        let maxNum = 0;
        waypoints.forEach(wp => {
            if (wp.label !== 'H') {
                const n = parseInt(wp.label);
                if (!isNaN(n) && n > maxNum) maxNum = n;
            }
        });
        return String(maxNum + 1);
    }

    function addWaypoint(x, y, label) {
        saveState();
        const hasH = waypoints.some(wp => wp.label === 'H');
        const has1 = waypoints.some(wp => wp.label === '1');
        if (!label) label = !hasH ? 'H' : (!has1 ? '1' : getNextLabel());
        waypoints.push({ x, y, label, params: { height: 100, verticalSpeed: 5, horizontalSpeed: 15, turnMode: '曲线飞行' } });
        dirtyIntersections = true;
        refreshCanvas();
    }

    function deleteWaypoint(index) {
        if (index == null || index >= waypoints.length) return;
        if (waypoints[index].label === 'H' && confirm('删除H点会清空所有航点，确定？')) {
            clearAllWaypoints(); return;
        }
        saveState();
        waypoints.splice(index, 1);
        auxConnections.forEach(conn => conn.delete(waypoints[index]?.label));
        selectedWaypointIndex = null; selectedEdges = [];
        refreshCanvas();
    }

    function clearAllWaypoints() {
        if (waypoints.length === 0 || !confirm('确定清空所有航点？')) return;
        saveState();
        waypoints = [];
        auxConnections.forEach(conn => conn.clear());
        selectedEdges = [];
        refreshCanvas();
    }

    function deleteSelectedWaypoint() { deleteWaypoint(selectedWaypointIndex); }
    function toggleAutoClose() { autoClose = document.getElementById('autoCloseCheck').checked; refreshCanvas(); }
    function setAsHome(index) {
        if (waypoints[index].label === 'H') return;
        const oldHome = waypoints.findIndex(w => w.label === 'H');
        if (oldHome >= 0) waypoints[oldHome].label = getNextLabel();
        waypoints[index].label = 'H';
        saveState(); refreshCanvas();
    }

    // ==================== 辅助点/圆/方向线 ====================
    function addAuxPoint(x, y) {
        const label = `A${auxPoints.length + 1}`;
        auxPoints.push({ x, y, label });
        auxConnections.set(auxPoints.length - 1, new Set());
        dirtyIntersections = true; refreshCanvas();
    }
    function deleteAuxPoint(index) {
        auxPoints.splice(index, 1);
        auxConnections.delete(index);
        const newMap = new Map();
        for (let i = 0; i < auxPoints.length; i++) {
            newMap.set(i, auxConnections.get(i >= index ? i + 1 : i) || new Set());
        }
        auxConnections = newMap;
        dirtyIntersections = true; refreshCanvas();
    }
    function updateAuxConnections() {
        const th = 20 / scale;
        auxPoints.forEach((ap, idx) => {
            const conn = auxConnections.get(idx) || new Set();
            waypoints.forEach(wp => {
                if (!conn.has(wp.label) && dist(ap.x, ap.y, wp.x, wp.y) <= th) conn.add(wp.label);
            });
            auxConnections.set(idx, conn);
        });
        dirtyIntersections = true;
    }
    function getNearbyAux(wx, wy) {
        const th = 20 / scale;
        for (let i = 0; i < auxPoints.length; i++) if (dist(wx, wy, auxPoints[i].x, auxPoints[i].y) <= th) return i;
        return -1;
    }
    function addCircleForVertex(index) {
        const radius = prompt('输入半径（米）:', '100');
        if (!radius || isNaN(radius) || radius <= 0) return;
        auxCircles.push({ centerType: 'vertex', centerRef: waypoints[index].label, radius: parseFloat(radius) });
        dirtyIntersections = true; refreshCanvas();
    }
    function addDirectionLine(index) {
        const angle = prompt('输入方向角度（0-360°）:', '315');
        if (angle === null || isNaN(angle)) return;
        auxDirLines.push({ vertexLabel: waypoints[index].label, angle: parseFloat(angle) });
        dirtyIntersections = true; refreshCanvas();
    }
    function clearAllCircles() { auxCircles = []; dirtyIntersections = true; refreshCanvas(); }
    function deleteSelectedCircle() {
        const list = document.getElementById('circleList').children;
        for (let i = 0; i < list.length; i++) if (list[i].classList.contains('selected')) { auxCircles.splice(i, 1); break; }
        dirtyIntersections = true; refreshCanvas();
    }

    // ==================== 交点计算 ====================
    function computeAllIntersections() {
        const segs = [];
        if (waypoints.length >= 2) {
            for (let i = 0; i < waypoints.length - 1; i++) segs.push([waypoints[i], waypoints[i+1]]);
            if (autoClose && waypoints.length >= 3) segs.push([waypoints[waypoints.length-1], waypoints[0]]);
        }
        auxConnections.forEach((conn, idx) => {
            const ap = auxPoints[idx];
            conn.forEach(wlbl => {
                const wp = waypoints.find(w => w.label === wlbl);
                if (wp) segs.push([ap, wp]);
            });
        });
        const WORLD_LENGTH = 1e6;
        auxDirLines.forEach(dl => {
            const wp = waypoints.find(w => w.label === dl.vertexLabel);
            if (wp) {
                const rad = toRad(90 - dl.angle);
                segs.push([wp, { x: wp.x + WORLD_LENGTH * Math.cos(rad), y: wp.y - WORLD_LENGTH * Math.sin(rad) }]);
            }
        });
        const allPts = [];
        auxCircles.forEach(c => {
            let center = (c.centerType === 'vertex') ? waypoints.find(w => w.label === c.centerRef) : auxPoints[c.centerRef];
            if (!center) return;
            segs.forEach(seg => allPts.push(...lineCircleIntersections(seg[0], seg[1], center, c.radius)));
        });
        for (let i = 0; i < segs.length; i++)
            for (let j = i+1; j < segs.length; j++) {
                const inter = segmentIntersection(segs[i][0], segs[i][1], segs[j][0], segs[j][1]);
                if (inter) allPts.push(inter);
            }
        return allPts.filter(pt => !waypoints.some(w => dist(pt.x, pt.y, w.x, w.y) < 5));
    }
    function lineCircleIntersections(p1, p2, center, radius) {
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const fx = p1.x - center.x, fy = p1.y - center.y;
        const a = dx*dx + dy*dy;
        if (a === 0) return Math.hypot(fx, fy) <= radius+1e-6 ? [{x:p1.x, y:p1.y}] : [];
        const b = 2*(fx*dx + fy*dy), c = fx*fx + fy*fy - radius*radius;
        const disc = b*b - 4*a*c;
        if (disc < 0) return [];
        const sqrt = Math.sqrt(disc);
        const t1 = (-b - sqrt)/(2*a), t2 = (-b + sqrt)/(2*a);
        const pts = [];
        if (t1 >=0 && t1 <=1) pts.push({ x: p1.x + dx*t1, y: p1.y + dy*t1 });
        if (t2 >=0 && t2 <=1) pts.push({ x: p1.x + dx*t2, y: p1.y + dy*t2 });
        return pts;
    }
    function segmentIntersection(p1, p2, p3, p4) {
        const denom = (p1.x-p2.x)*(p3.y-p4.y) - (p1.y-p2.y)*(p3.x-p4.x);
        if (Math.abs(denom) < 1e-12) return null;
        const t = ((p1.x-p3.x)*(p3.y-p4.y) - (p1.y-p3.y)*(p3.x-p4.x)) / denom;
        const u = -((p1.x-p2.x)*(p1.y-p3.y) - (p1.y-p2.y)*(p1.x-p3.x)) / denom;
        if (t>=0 && t<=1 && u>=0 && u<=1) return { x: p1.x + t*(p2.x-p1.x), y: p1.y + t*(p2.y-p1.y) };
        return null;
    }
    function updateIntersectionsCache() { if (dirtyIntersections) { intersectionsCache = computeAllIntersections(); dirtyIntersections = false; } }

    // ==================== 绘图 ====================
    function refreshCanvas() { drawCanvas(); updateRotateCombos(); updateCircleListbox(); }
    function drawCanvas() {
        const cw = canvas.clientWidth, ch = canvas.clientHeight;
        canvas.width = cw * dpr; canvas.height = ch * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, cw, ch);
        ctx.fillStyle = 'white'; ctx.fillRect(0, 0, cw, ch);

        const gs = 50 * scale;
        const ox = panOffset[0] % gs, oy = panOffset[1] % gs;
        ctx.strokeStyle = '#d0d0d0'; ctx.lineWidth = 1;
        for (let x = ox; x < cw; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,ch); ctx.stroke(); }
        for (let y = oy; y < ch; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cw,y); ctx.stroke(); }

        // 最新罗盘（8方位+度数）
        const r = 50, cxr = cw - r - 15, cyr = r + 15;
        ctx.strokeStyle = '#7f8c8d'; ctx.beginPath(); ctx.arc(cxr, cyr, r, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr-r, cyr); ctx.lineTo(cxr+r, cyr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr, cyr-r); ctx.lineTo(cxr, cyr+r); ctx.stroke();
        for (let deg = 0; deg < 360; deg += 45) {
            const rad = toRad(90 - deg);
            ctx.beginPath(); ctx.moveTo(cxr+(r-6)*Math.cos(rad), cyr-(r-6)*Math.sin(rad));
            ctx.lineTo(cxr+r*Math.cos(rad), cyr-r*Math.sin(rad)); ctx.stroke();
        }
        const dirs = ['N','NE','E','SE','S','SW','W','NW'];
        const angs = [0,45,90,135,180,225,270,315];
        ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#2c3e50'; ctx.textAlign = 'center';
        dirs.forEach((d,i) => {
            const rad = toRad(90 - angs[i]);
            ctx.fillText(d, cxr+(r+14)*Math.cos(rad), cyr-(r+14)*Math.sin(rad));
        });
        ctx.font = '7px Arial'; ctx.fillStyle = '#555';
        angs.forEach((deg,i) => {
            const rad = toRad(90 - deg);
            ctx.fillText(`${deg}°`, cxr+(r+23)*Math.cos(rad), cyr-(r+23)*Math.sin(rad));
        });

        // 航线+标注
        const edges = getAllEdges();
        edges.forEach(({i1,i2}) => {
            const p1 = waypoints[i1], p2 = waypoints[i2];
            const sp1 = worldToScreen(p1.x, p1.y), sp2 = worldToScreen(p2.x, p2.y);
            let color = '#2980b9';
            if (selectedEdges.some(e => (e.i1===i1&&e.i2===i2)||(e.i1===i2&&e.i2===i1))) color = '#e74c3c';
            ctx.strokeStyle = color; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(sp1.x, sp1.y); ctx.lineTo(sp2.x, sp2.y); ctx.stroke();
            const az = azimuth(p1.x, p1.y, p2.x, p2.y);
            const d = dist(p1.x, p1.y, p2.x, p2.y);
            const mx = (sp1.x+sp2.x)/2, my = (sp1.y+sp2.y)/2;
            ctx.fillStyle = '#e67e22'; ctx.font = 'bold 8px Arial';
            ctx.fillText(`${az.toFixed(0)}° ${d.toFixed(1)}m`, mx, my-8);
        });

        // 航点
        waypoints.forEach((wp,i) => {
            const sp = worldToScreen(wp.x, wp.y);
            const color = wp.label==='H'?'#e74c3c':(i===selectedWaypointIndex?'#f39c12':'#3498db');
            ctx.fillStyle = color; ctx.beginPath(); ctx.arc(sp.x, sp.y, (wp.label==='H'||i===selectedWaypointIndex)?14:11, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#2c3e50'; ctx.font = `bold ${wp.label==='H'?15:13}px Arial`; ctx.textAlign = 'center'; ctx.fillText(wp.label, sp.x, sp.y-20);
            if (waypoints.length >= 3) {
                const prev = waypoints[(i-1+waypoints.length)%waypoints.length];
                const next = waypoints[(i+1)%waypoints.length];
                const ang = calcAngleAtVertex(prev, wp, next);
                ctx.font = '8px Arial';
                ctx.fillText(`内:${ang.toFixed(1)}°`, sp.x, sp.y+15);
            }
        });

        // 辅助方向线
        auxDirLines.forEach(dl => {
            const wp = waypoints.find(w => w.label === dl.vertexLabel);
            if (!wp) return;
            const sp = worldToScreen(wp.x, wp.y);
            const rad = toRad(90 - dl.angle);
            const wx = wp.x + 1e6 * Math.cos(rad), wy = wp.y - 1e6 * Math.sin(rad);
            const ep = worldToScreen(wx, wy);
            ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
            ctx.beginPath(); ctx.moveTo(sp.x, sp.y); ctx.lineTo(ep.x, ep.y); ctx.stroke(); ctx.setLineDash([]);
        });

        // 辅助圆
        auxCircles.forEach(c => {
            let center = (c.centerType==='vertex')? waypoints.find(w=>w.label===c.centerRef) : auxPoints[c.centerRef];
            if (!center) return;
            const sp = worldToScreen(center.x, center.y);
            ctx.strokeStyle = 'green'; ctx.lineWidth = 2; ctx.setLineDash([4,2]);
            ctx.beginPath(); ctx.arc(sp.x, sp.y, c.radius*scale, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
            ctx.fillStyle = 'green'; ctx.font = 'bold 9px Arial'; ctx.fillText(`${Math.round(c.radius)}m`, sp.x, sp.y);
        });

        // 交点
        if (showIntersections) {
            updateIntersectionsCache();
            intersectionsCache.forEach(pt => {
                const sp = worldToScreen(pt.x, pt.y);
                ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(sp.x-5, sp.y); ctx.lineTo(sp.x+5, sp.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(sp.x, sp.y-5); ctx.lineTo(sp.x, sp.y+5); ctx.stroke();
            });
        }

        // 辅助点
        auxPoints.forEach((ap, idx) => {
            const sp = worldToScreen(ap.x, ap.y);
            ctx.fillStyle = '#9400d3'; ctx.beginPath(); ctx.arc(sp.x, sp.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#adff2f'; ctx.font = 'bold 8px Arial'; ctx.fillText(ap.label, sp.x+10, sp.y-10);
        });

        updateStatusMessage();
    }

    function getAllEdges() {
        const e = [];
        if (waypoints.length >= 2) {
            for (let i = 0; i < waypoints.length - 1; i++) e.push({ i1: i, i2: i+1 });
            if (autoClose && waypoints.length >= 3) e.push({ i1: waypoints.length-1, i2: 0 });
        }
        return e;
    }
    function calcAngleAtVertex(p1, p2, p3) {
        const v1 = { x: p1.x-p2.x, y: p1.y-p2.y }, v2 = { x: p3.x-p2.x, y: p3.y-p2.y };
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.hypot(v1.x,v1.y), m2 = Math.hypot(v2.x,v2.y);
        if (m1===0 || m2===0) return 0;
        return toDeg(Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2)))));
    }

    function updateStatusMessage() {
        if (selectedEdges.length === 2) {
            const [e1, e2] = selectedEdges;
            let common = null;
            if (e1.i1===e2.i1||e1.i1===e2.i2) common=e1.i1;
            else if (e1.i2===e2.i1||e1.i2===e2.i2) common=e1.i2;
            if (common != null) {
                const o1 = (common===e1.i1)? waypoints[e1.i2] : waypoints[e1.i1];
                const o2 = (common===e2.i1)? waypoints[e2.i2] : waypoints[e2.i1];
                const ang = calcAngleAtVertex(o1, waypoints[common], o2);
                statusBar.textContent = `夹角:${ang.toFixed(1)}° (点击修改)`;
            }
        } else statusBar.textContent = `航点:${waypoints.length}`;
    }

    function modifySelectedAngle() {
        if (selectedEdges.length !== 2) return;
        const [e1,e2] = selectedEdges;
        let common = null;
        if (e1.i1===e2.i1||e1.i1===e2.i2) common=e1.i1;
        else if (e1.i2===e2.i1||e1.i2===e2.i2) common=e1.i2;
        if (common == null) return;
        const redOther = (common===e1.i1)? e1.i2 : e1.i1;
        const yellowOther = (common===e2.i1)? e2.i2 : e2.i1;
        const curAng = calcAngleAtVertex(waypoints[redOther], waypoints[common], waypoints[yellowOther]);
        const newAng = prompt(`当前内角 ${curAng.toFixed(1)}°，输入新角度（0-180）：`, curAng.toFixed(1));
        if (newAng === null || isNaN(newAng)) return;
        const angle = parseFloat(newAng);
        const pc = waypoints[common], py = waypoints[yellowOther], pr = waypoints[redOther];
        const vy = { x: py.x-pc.x, y: py.y-pc.y };
        const vr = { x: pr.x-pc.x, y: pr.y-pc.y };
        const ly = Math.hypot(vy.x,vy.y), lr = Math.hypot(vr.x,vr.y);
        if (ly===0||lr===0) return;
        const dot = vy.x*vr.x + vy.y*vr.y;
        const cross = vy.x*vr.y - vy.y*vr.x;
        const curRad = Math.atan2(cross, dot);
        const targetRad = (cross >= 0 ? 1 : -1) * toRad(angle);
        const rot = targetRad - curRad;
        const cosR = Math.cos(rot), sinR = Math.sin(rot);
        const newVr = { x: vr.x*cosR - vr.y*sinR, y: vr.x*sinR + vr.y*cosR };
        const vlen = Math.hypot(newVr.x, newVr.y);
        if (vlen > 1e-12) { newVr.x *= lr/vlen; newVr.y *= lr/vlen; }
        saveState();
        waypoints[redOther].x = pc.x + newVr.x;
        waypoints[redOther].y = pc.y + newVr.y;
        refreshCanvas();
    }

    // ==================== 航线旋转（基于真实航向） ====================
    function updateRotateCombos() {
        const s = document.getElementById('rotateStart'), e = document.getElementById('rotateEnd');
        const labels = waypoints.map(w => w.label);
        if(s) s.innerHTML = labels.map(l => `<option>${l}</option>`).join('');
        if(e) e.innerHTML = labels.map(l => `<option>${l}</option>`).join('');
    }
    function rotateRoute() {
        const startLabel = document.getElementById('rotateStart').value;
        const endLabel = document.getElementById('rotateEnd').value;
        const target = parseFloat(document.getElementById('rotateTarget').value);
        if (isNaN(target)) return;
        const start = waypoints.find(w => w.label === startLabel);
        const end = waypoints.find(w => w.label === endLabel);
        if (!start || !end) return;
        const curAz = azimuth(start.x, start.y, end.x, end.y);
        const delta = target - curAz;
        const cx = start.x, cy = start.y;
        const rad = toRad(delta);
        const cosA = Math.cos(rad), sinA = Math.sin(rad);
        saveState();
        waypoints.forEach(wp => {
            const dx = wp.x - cx, dy = wp.y - cy;
            wp.x = cx + dx * cosA - dy * sinA;
            wp.y = cy + dx * sinA + dy * cosA;
        });
        refreshCanvas();
    }

    // ==================== 相对坐标编辑器 ====================
    function openRelativeDialog() {
        document.getElementById('relativeModal').classList.add('active');
        updateBasePointCombo();
    }
    function closeRelativeDialog() { document.getElementById('relativeModal').classList.remove('active'); }
    function updateBasePointCombo() {
        document.getElementById('basePointSelect').innerHTML = waypoints.map(w => `<option>${w.label}</option>`).join('');
    }
    function addWaypointByRelative() {
        const baseLabel = document.getElementById('basePointSelect').value;
        const az = parseFloat(document.getElementById('relAzimuth').value);
        const distVal = parseFloat(document.getElementById('relDistance').value);
        const label = document.getElementById('relLabel').value || getNextLabel();
        const bp = waypoints.find(w => w.label === baseLabel);
        if (!bp || isNaN(az) || isNaN(distVal)) return;
        const rad = toRad(90 - az);
        const nx = bp.x + distVal * Math.cos(rad);
        const ny = bp.y - distVal * Math.sin(rad);
        saveState();
        waypoints.push({ x: nx, y: ny, label, params: { height: 100, verticalSpeed: 5, horizontalSpeed: 15, turnMode: '曲线飞行' } });
        closeRelativeDialog();
        refreshCanvas();
    }

    // 弹窗拖动
    const modal = document.getElementById('relativeModal');
    const header = document.getElementById('modalHeader');
    header.addEventListener('touchstart', (e) => {
        e.stopPropagation(); isDraggingModal = true;
        const rect = modal.getBoundingClientRect();
        modalDragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, left: rect.left, top: rect.top };
    });
    document.addEventListener('touchmove', (e) => {
        if (isDraggingModal) {
            modal.style.left = (modalDragStart.left + e.touches[0].clientX - modalDragStart.x) + 'px';
            modal.style.top = (modalDragStart.top + e.touches[0].clientY - modalDragStart.y) + 'px';
            modal.style.transform = 'none';
        }
    }, { passive: false });
    document.addEventListener('touchend', () => { isDraggingModal = false; });

    // ==================== 辅助功能 ====================
    function resetView() {
        if (waypoints.length === 0) { scale = 1; panOffset = [0,0]; }
        else {
            const xs = waypoints.map(w=>w.x), ys = waypoints.map(w=>w.y);
            const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
            const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
            const w = maxX-minX+100, h = maxY-minY+100;
            const cw=canvas.clientWidth, ch=canvas.clientHeight;
            scale = Math.min(cw/w, ch/h, 2.0); scale = Math.max(scale, 0.5);
            panOffset = [cw/2 - cx*scale, ch/2 - cy*scale];
        }
        refreshCanvas();
    }
    function updateCircleListbox() {
        const list = document.getElementById('circleList');
        list.innerHTML = auxCircles.map((c,i) => `<div>圆${i+1} R=${c.radius}m</div>`).join('');
    }
    let selectedCircleIndex = -1;
    document.getElementById('circleList').addEventListener('click', (e) => {
        const idx = Array.from(e.target.parentNode.children).indexOf(e.target);
        if (idx >= 0) selectedCircleIndex = idx;
    });

    function togglePanel() { document.getElementById('left-panel').classList.toggle('open'); }
    function closePanel() { document.getElementById('left-panel').classList.remove('open'); }
    function toggleAddMode() {
        addMode = !addMode; auxMode = false;
        document.getElementById('addBtn').style.background = addMode ? '#34c759' : '';
        document.getElementById('auxModeBtn').style.background = '';
    }
    function toggleAuxMode() {
        auxMode = !auxMode; addMode = false;
        document.getElementById('addBtn').style.background = '';
        document.getElementById('auxModeBtn').style.background = auxMode ? '#ff9500' : '';
    }
    function showWaypointList() {
        const div = document.getElementById('waypoint-list');
        div.style.display = div.style.display === 'block' ? 'none' : 'block';
        updateWaypointList();
    }
    function updateWaypointList() {
        const div = document.getElementById('waypoint-list');
        div.innerHTML = waypoints.map((wp,i) => `<div data-index="${i}">${wp.label} (${wp.params.height}m)</div>`).join('');
    }
    function selectWaypoint(index) {
        selectedWaypointIndex = index;
        document.getElementById('waypoint-list').style.display = 'none';
        refreshCanvas();
    }

    // 航点列表长按互换
    const wpList = document.getElementById('waypoint-list');
    let wpPressTimer = null;
    wpList.addEventListener('touchstart', (e) => {
        const item = e.target.closest('div[data-index]');
        if (!item) return;
        const index = parseInt(item.dataset.index);
        wpPressTimer = setTimeout(() => {
            const targetLabel = prompt(`将航点 ${waypoints[index].label} 与哪个航点互换位置？`, '');
            if (targetLabel) {
                const targetIndex = waypoints.findIndex(w => w.label === targetLabel);
                if (targetIndex >= 0 && targetIndex !== index) {
                    saveState();
                    [waypoints[index], waypoints[targetIndex]] = [waypoints[targetIndex], waypoints[index]];
                    if (selectedWaypointIndex === index) selectedWaypointIndex = targetIndex;
                    else if (selectedWaypointIndex === targetIndex) selectedWaypointIndex = index;
                    selectedEdges = [];
                    refreshCanvas(); updateWaypointList();
                } else alert('未找到该航点或不能与自身互换');
            }
            wpPressTimer = null;
        }, 500);
    });
    wpList.addEventListener('touchmove', () => { if (wpPressTimer) { clearTimeout(wpPressTimer); wpPressTimer = null; } });
    wpList.addEventListener('touchend', () => { if (wpPressTimer) { clearTimeout(wpPressTimer); wpPressTimer = null; } });

    // ==================== 触摸事件 ====================
    function getCanvasTouch(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    function getCanvasChangedTouch(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.changedTouches[0];
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const panel = document.getElementById('left-panel');
        if (panel.classList.contains('open')) {
            const t = e.touches[0];
            if (!panel.contains(document.elementFromPoint(t.clientX, t.clientY))) closePanel();
        }
        if (e.touches.length === 2) {
            touchMode = 'pinch';
            const t1 = e.touches[0], t2 = e.touches[1];
            pinchStartDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            pinchStartScale = scale;
            const rect = canvas.getBoundingClientRect();
            pinchCenter = { x: (t1.clientX + t2.clientX)/2 - rect.left, y: (t1.clientY + t2.clientY)/2 - rect.top };
            pinchWorldCenter = screenToWorld(pinchCenter.x, pinchCenter.y);
            return;
        }
        if (touchMode === 'pinch') return;

        const pt = getCanvasTouch(e);
        const world = screenToWorld(pt.x, pt.y);
        if (addMode) { addWaypoint(world.x, world.y); return; }
        if (auxMode) { addAuxPoint(world.x, world.y); auxMode = false; document.getElementById('auxModeBtn').style.background = ''; return; }

        clearLongPress();
        const auxIdx = getNearbyAux(world.x, world.y);
        if (auxIdx >= 0) {
            touchMode = 'drag-aux'; draggingAuxIndex = auxIdx;
            longPressTarget = { type: 'aux', index: auxIdx };
            startLongPress(e.touches[0]);
            return;
        }

        const overlapping = [];
        for (let i = 0; i < waypoints.length; i++) if (dist(world.x, world.y, waypoints[i].x, waypoints[i].y) <= 15/scale) overlapping.push(i);
        if (overlapping.length === 1) {
            const i = overlapping[0];
            touchMode = 'drag-waypoint'; draggingWaypointIndex = i; selectedWaypointIndex = i;
            longPressTarget = { type: 'waypoint', index: i };
            startLongPress(e.touches[0]);
            refreshCanvas(); return;
        } else if (overlapping.length > 1) {
            if (overlappingChosen != null && overlapping.includes(overlappingChosen)) {
                touchMode = 'drag-waypoint'; draggingWaypointIndex = overlappingChosen; selectedWaypointIndex = overlappingChosen;
                longPressTarget = { type: 'waypoint', index: overlappingChosen };
                startLongPress(e.touches[0]);
                refreshCanvas(); return;
            }
            const labels = overlapping.map(i => waypoints[i].label).join(', ');
            const choice = prompt(`重叠航点：${labels}。输入标签选择：`, '');
            if (choice) {
                const chosen = waypoints.findIndex(w => w.label === choice);
                if (chosen >= 0 && overlapping.includes(chosen)) {
                    overlappingChosen = chosen;
                    touchMode = 'drag-waypoint'; draggingWaypointIndex = chosen; selectedWaypointIndex = chosen;
                    longPressTarget = { type: 'waypoint', index: chosen };
                    startLongPress(e.touches[0]);
                    refreshCanvas(); return;
                }
            }
            touchMode = 'idle'; return;
        }

        const edges = getAllEdges();
        for (const edge of edges) {
            const p1 = waypoints[edge.i1], p2 = waypoints[edge.i2];
            if (pointToSegmentDist(world.x, world.y, p1.x, p1.y, p2.x, p2.y) <= edgeThreshold/scale) {
                toggleEdgeSelection(edge); refreshCanvas(); touchMode = 'idle'; return;
            }
        }
        if (showIntersections) {
            updateIntersectionsCache();
            for (const inter of intersectionsCache) if (dist(world.x, world.y, inter.x, inter.y) <= 12/scale) { addWaypoint(inter.x, inter.y); return; }
        }
        touchMode = 'pan';
        panStart = { x: pt.x, y: pt.y, offsetX: panOffset[0], offsetY: panOffset[1] };
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (touchMode === 'pinch' && e.touches.length === 2) {
            const t1 = e.touches[0], t2 = e.touches[1];
            const curDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            if (pinchStartDist && pinchCenter && pinchWorldCenter) {
                const factor = curDist / pinchStartDist;
                const newScale = Math.min(20, Math.max(0.1, pinchStartScale * factor));
                const newPanX = pinchCenter.x - pinchWorldCenter.x * newScale;
                const newPanY = pinchCenter.y - pinchWorldCenter.y * newScale;
                scale = newScale; panOffset = [newPanX, newPanY];
                refreshCanvas();
            }
            pinchStartDist = curDist; return;
        }
        if (touchMode === 'drag-waypoint' || touchMode === 'drag-aux') {
            const pt = getCanvasTouch(e);
            const world = screenToWorld(pt.x, pt.y);
            if (touchMode === 'drag-waypoint') { waypoints[draggingWaypointIndex].x = world.x; waypoints[draggingWaypointIndex].y = world.y; updateAuxConnections(); }
            else { auxPoints[draggingAuxIndex].x = world.x; auxPoints[draggingAuxIndex].y = world.y; updateAuxConnections(); }
            clearLongPress(); refreshCanvas();
        } else if (touchMode === 'pan') {
            const pt = getCanvasTouch(e);
            panOffset[0] = panStart.offsetX + (pt.x - panStart.x);
            panOffset[1] = panStart.offsetY + (pt.y - panStart.y);
            refreshCanvas();
        }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        clearLongPress();
        if (touchMode === 'drag-waypoint') saveState();
        if (touchMode === 'pinch') { pinchStartDist = null; pinchCenter = null; pinchWorldCenter = null; }
        const now = Date.now();
        if (touchMode === 'idle' || touchMode === 'pan') {
            const pt = getCanvasChangedTouch(e);
            if (lastTapPos && Math.abs(pt.x - lastTapPos.x) < 15 && Math.abs(pt.y - lastTapPos.y) < 15 && now - lastTapTime < 300) {
                const world = screenToWorld(pt.x, pt.y);
                addWaypoint(world.x, world.y);
                lastTapTime = 0;
            } else { lastTapTime = now; lastTapPos = { x: pt.x, y: pt.y }; }
        }
        if (touchMode !== 'drag-waypoint' && touchMode !== 'drag-aux') overlappingChosen = null;
        touchMode = 'idle';
    });

    function startLongPress(touch) {
        clearLongPress();
        longPressTimer = setTimeout(() => {
            if (longPressTarget) {
                if (longPressTarget.type === 'waypoint') showWaypointMenu(longPressTarget.index);
                else if (longPressTarget.type === 'aux') { if (confirm(`删除辅助点 ${auxPoints[longPressTarget.index].label}？`)) deleteAuxPoint(longPressTarget.index); }
            }
            longPressTarget = null;
        }, 500);
    }
    function clearLongPress() { if (longPressTimer) clearTimeout(longPressTimer); }
    function showWaypointMenu(index) {
        const action = prompt(`航点 ${waypoints[index].label}:\n1.删除\n2.设为H点\n3.辅助圆\n4.方向线`, '');
        if (action === '1') deleteWaypoint(index);
        else if (action === '2') setAsHome(index);
        else if (action === '3') addCircleForVertex(index);
        else if (action === '4') addDirectionLine(index);
    }
    function toggleEdgeSelection(edge) {
        const pair = { i1: edge.i1, i2: edge.i2 };
        const exists = selectedEdges.findIndex(e => (e.i1===pair.i1&&e.i2===pair.i2)||(e.i1===pair.i2&&e.i2===pair.i1));
        if (exists >= 0) selectedEdges.splice(exists, 1);
        else { if (selectedEdges.length >= 2) selectedEdges.shift(); selectedEdges.push(pair); }
    }

    document.getElementById('showIntersectionsCheck').addEventListener('change', (e) => { showIntersections = e.target.checked; refreshCanvas(); });

    // 缩放滑块
    scaleSlider.addEventListener('input', () => {
        const newScale = parseFloat(scaleSlider.value);
        const cw = canvas.clientWidth, ch = canvas.clientHeight;
        const worldCenter = screenToWorld(cw/2, ch/2);
        scale = newScale;
        panOffset = [cw/2 - worldCenter.x * scale, ch/2 - worldCenter.y * scale];
        refreshCanvas();
    });
    function updateScaleDisplay() { scaleSlider.value = scale; scaleValue.textContent = scale.toFixed(1) + 'x'; }

    // 持久化
    function loadWaypoints() {
        const saved = localStorage.getItem('gcs-waypoints');
        if (saved) try { waypoints = JSON.parse(saved); } catch(e) {}
    }
    loadWaypoints();
    saveState();
    refreshCanvas();
</script>
