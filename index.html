<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>地面站 · 移动版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <style>
        :root {
            --bg: #1a1a1a;
            --surface: #2c2c2e;
            --accent: #0a84ff;
            --danger: #ff453a;
            --text: #ffffff;
            --secondary: #8e8e93;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        #canvas-container {
            flex: 1;
            position: relative;
            background: #000;
            touch-action: none;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* 底部工具栏 */
        #bottom-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(28,28,30,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-top: 1px solid rgba(255,255,255,0.15);
            z-index: 20;
            min-height: 60px;
        }
        #bottom-bar::-webkit-scrollbar { display: none; }
        .tool-btn {
            flex-shrink: 0;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .tool-btn:active { background: var(--accent); }
        .tool-btn.danger { background: var(--danger); }
        #addBtn {
            background: var(--accent);
            box-shadow: 0 2px 10px rgba(10,132,255,0.4);
        }

        /* 顶部状态栏 */
        #status-bar {
            position: absolute;
            top: 8px; left: 50%;
            transform: translateX(-50%);
            background: rgba(28,28,30,0.8);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--secondary);
            z-index: 15;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
        }

        /* 弹出面板（相对坐标、工具箱） */
        .slide-panel {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 20px 16px 30px;
            z-index: 30;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 70vh;
            overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .slide-panel.open { transform: translateY(0); }
        .slide-panel h3 { margin-top:0; font-size:18px; margin-bottom:16px; color: var(--accent); }
        .panel-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 12px; flex-wrap: wrap;
        }
        .panel-row label { min-width:70px; font-size:14px; color: var(--secondary); }
        input, select, textarea {
            background: #3a3a3c;
            border: 1px solid #555;
            color: var(--text);
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 16px;
            flex: 1;
        }
        textarea { font-family: monospace; height: 120px; resize: vertical; }
        .btn-block {
            width: 100%; background: var(--accent);
            border: none; color: white;
            padding: 14px; border-radius: 12px;
            font-size: 17px; margin-top: 8px; cursor: pointer;
        }
        .close-panel {
            position: absolute; top: 12px; right: 16px;
            background: none; border: none;
            color: var(--secondary); font-size: 24px;
        }
        .help-text { font-size:14px; color:#aaa; margin:4px 0 10px; }

        /* 航点列表浮窗 */
        #waypoint-list {
            position: absolute;
            top: 50px; right: 8px;
            width: 140px;
            background: rgba(28,28,30,0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 18;
            display: none;
            border: 1px solid rgba(255,255,255,0.15);
        }
        #waypoint-list.visible { display: block; }
        #waypoint-list div {
            padding: 10px; border-radius: 8px;
            font-size: 14px; cursor: pointer;
        }
        #waypoint-list div:active { background: var(--accent); }

        #hint {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: rgba(255,255,255,0.5);
            font-size: 18px; text-align: center;
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
<div id="canvas-container">
    <canvas id="mainCanvas"></canvas>
    <div id="status-bar">就绪</div>
    <div id="hint">双击地图添加航点</div>
    <div id="waypoint-list"></div>

    <div id="bottom-bar">
        <button class="tool-btn" onclick="undo()">↩</button>
        <button class="tool-btn" onclick="redo()">↪</button>
        <button class="tool-btn" id="addBtn" onclick="toggleAddMode()">＋</button>
        <button class="tool-btn" onclick="openRelativePanel()">⊕</button>
        <button class="tool-btn" onclick="openToolbox()">⚙</button>
        <button class="tool-btn" onclick="showWaypointList()">☰</button>
        <button class="tool-btn danger" onclick="clearAllWaypoints()">✕</button>
    </div>

    <!-- 相对坐标/航线生成器 -->
    <div class="slide-panel" id="relativePanel">
        <button class="close-panel" onclick="closeRelativePanel()">✕</button>
        <h3>航线生成器 (方位/距离)</h3>
        <div class="panel-row">
            <label>基准点纬度</label>
            <input type="number" id="baseLat" placeholder="39.90" step="0.000001">
        </div>
        <div class="panel-row">
            <label>基准点经度</label>
            <input type="number" id="baseLng" placeholder="116.40" step="0.000001">
        </div>
        <div class="panel-row">
            <label>基准点高度(m)</label>
            <input type="number" id="baseAlt" value="50" step="1">
        </div>
        <div class="panel-row">
            <button class="btn-block" style="flex:1; margin:0;" onclick="pickBaseFromMap()">从地图点选基准点</button>
        </div>
        <label>航段列表 (每行：方向角°, 距离m, 高度m)</label>
        <textarea id="segmentList" placeholder="例:&#10;90, 100, 50&#10;0, 200, 80&#10;270, 150"></textarea>
        <div class="help-text">北=0°, 东=90°, 南=180°, 西=270°；高度可省略</div>
        <button class="btn-block" onclick="generateFromRelative()">生成连续航点</button>
    </div>

    <!-- 工具箱面板 -->
    <div class="slide-panel" id="toolboxPanel">
        <button class="close-panel" onclick="closeToolbox()">✕</button>
        <h3>工具箱</h3>
        <div class="panel-row">
            <label>起始航点</label>
            <select id="rotateStart"></select>
            <label>终点</label>
            <select id="rotateEnd"></select>
        </div>
        <div class="panel-row">
            <label>目标航向°</label>
            <input type="number" id="rotateTarget" value="0" style="width:80px;">
            <button class="btn-block" style="flex:0; margin:0;" onclick="rotateRoute()">旋转航线</button>
        </div>
        <div class="panel-row">
            <label>自动闭合</label>
            <input type="checkbox" id="autoCloseCheck" onchange="toggleAutoClose()">
        </div>
        <button class="btn-block" onclick="clearAllCircles()">清除所有辅助圆</button>
        <div id="circleList" style="max-height:100px; overflow-y:auto; margin:8px 0;"></div>
        <button class="btn-block" onclick="deleteSelectedCircle()">删除选中圆</button>
        <div class="panel-row">
            <label>显示交点</label>
            <input type="checkbox" id="showIntersectionsCheck" onchange="refreshCanvas()">
        </div>
    </div>
</div>

<script>
    // ========== 完整全局状态 ==========
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const statusBar = document.getElementById('status-bar');
    const hint = document.getElementById('hint');

    let waypoints = [];
    let selectedWaypointIndex = null;
    let auxPoints = [];
    let auxConnections = new Map();
    let auxCircles = [];
    let auxDirLines = [];
    let scale = 1.0;
    let panOffset = [0, 0];
    let autoClose = false;
    let selectedEdges = [];
    let showIntersections = false;
    let dirtyIntersections = true;
    let intersectionsCache = [];
    let history = [];
    let historyIndex = -1;
    let addMode = false;
    let pickingBase = false;

    // 触摸状态
    let touchMode = null;        // 'drag-waypoint', 'drag-aux', 'pan', 'idle', 'pinch'
    let lastTapTime = 0;
    let lastTapPos = null;
    let longPressTimer = null;
    let longPressTarget = null;
    let pinchStartDist = null, pinchStartScale = 1;
    let draggingWaypointIndex = null, draggingAuxIndex = null;
    let panStart = null;

    // ========== 工具函数 ==========
    function toRad(deg) { return deg * Math.PI / 180; }
    function toDeg(rad) { return rad * 180 / Math.PI; }
    function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
    function azimuth(x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (Math.abs(dx) < 1e-12 && Math.abs(dy) < 1e-12) return 0;
        return (toDeg(Math.atan2(dx, dy)) + 360) % 360;
    }
    function pointToSegmentDist(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (dx === 0 && dy === 0) return Math.hypot(px - x1, py - y1);
        const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
        return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
    }

    function saveState() {
        const state = JSON.parse(JSON.stringify(waypoints));
        if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1);
        history.push(state);
        historyIndex = history.length - 1;
        if (history.length > 50) { history.shift(); historyIndex--; }
        dirtyIntersections = true;
    }
    function undo() {
        if (historyIndex > 0) {
            historyIndex--;
            waypoints = JSON.parse(JSON.stringify(history[historyIndex]));
            selectedWaypointIndex = null;
            refreshCanvas();
        }
    }
    function redo() {
        if (historyIndex < history.length - 1) {
            historyIndex++;
            waypoints = JSON.parse(JSON.stringify(history[historyIndex]));
            selectedWaypointIndex = null;
            refreshCanvas();
        }
    }

    function worldToScreen(wx, wy) {
        return { x: wx * scale + panOffset[0], y: wy * scale + panOffset[1] };
    }
    function screenToWorld(sx, sy) {
        return { x: (sx - panOffset[0]) / scale, y: (sy - panOffset[1]) / scale };
    }

    function getNextLabel() {
        let maxNum = 0;
        waypoints.forEach(wp => {
            if (wp.label !== 'H') {
                const n = parseInt(wp.label);
                if (!isNaN(n) && n > maxNum) maxNum = n;
            }
        });
        return String(maxNum + 1);
    }

    function addWaypoint(x, y, label) {
        saveState();
        const hasH = waypoints.some(wp => wp.label === 'H');
        const has1 = waypoints.some(wp => wp.label === '1');
        if (!label) label = !hasH ? 'H' : (!has1 ? '1' : getNextLabel());
        waypoints.push({ x, y, label, params: { height: 100, verticalSpeed: 5, horizontalSpeed: 15, turnMode: '曲线飞行' } });
        dirtyIntersections = true;
        refreshCanvas();
        hint.style.display = 'none';
    }

    function deleteWaypoint(index) {
        if (index == null || index >= waypoints.length) return;
        if (waypoints[index].label === 'H' && confirm('删除H点会清空所有航点，确定？')) {
            clearAllWaypoints(); return;
        }
        saveState();
        waypoints.splice(index, 1);
        selectedWaypointIndex = null;
        refreshCanvas();
    }

    function clearAllWaypoints() {
        if (waypoints.length === 0 || !confirm('确定清空所有航点？')) return;
        saveState();
        waypoints = [];
        refreshCanvas();
    }

    function toggleAutoClose() {
        autoClose = document.getElementById('autoCloseCheck').checked;
        refreshCanvas();
    }

    function deleteSelectedWaypoint() { deleteWaypoint(selectedWaypointIndex); }

    // ========== 辅助点/圆/方向线 ==========
    function addAuxPoint(x, y) {
        const label = `A${auxPoints.length + 1}`;
        auxPoints.push({ x, y, label });
        auxConnections.set(auxPoints.length - 1, new Set());
        dirtyIntersections = true;
        refreshCanvas();
    }

    function updateAuxConnections() {
        const th = 20 / scale;
        auxPoints.forEach((ap, idx) => {
            const conn = auxConnections.get(idx) || new Set();
            waypoints.forEach(wp => {
                if (!conn.has(wp.label) && dist(ap.x, ap.y, wp.x, wp.y) <= th) conn.add(wp.label);
            });
            auxConnections.set(idx, conn);
        });
        dirtyIntersections = true;
    }

    function getNearbyAux(wx, wy) {
        const th = 20 / scale;
        for (let i = 0; i < auxPoints.length; i++) {
            if (dist(wx, wy, auxPoints[i].x, auxPoints[i].y) <= th) return i;
        }
        return -1;
    }

    function addCircleForVertex(index) {
        const radius = prompt('输入半径（米）:', '100');
        if (!radius || isNaN(radius) || radius <= 0) return;
        auxCircles.push({ centerType: 'vertex', centerRef: waypoints[index].label, radius: parseFloat(radius) });
        dirtyIntersections = true;
        refreshCanvas();
    }

    function addDirectionLine(index) {
        const angle = prompt('输入方向角度（0-360°）:', '315');
        if (angle === null || isNaN(angle)) return;
        auxDirLines.push({ vertexLabel: waypoints[index].label, angle: parseFloat(angle) });
        dirtyIntersections = true;
        refreshCanvas();
    }

    function clearAllCircles() {
        auxCircles = [];
        dirtyIntersections = true;
        refreshCanvas();
    }

    function deleteSelectedCircle() {
        const list = document.getElementById('circleList').children;
        for (let i = 0; i < list.length; i++) {
            if (list[i].classList.contains('selected')) { auxCircles.splice(i, 1); break; }
        }
        dirtyIntersections = true;
        refreshCanvas();
    }

    // ========== 交点计算（完整保留原逻辑） ==========
    function computeAllIntersections() {
        const segs = [];
        if (waypoints.length >= 2) {
            for (let i = 0; i < waypoints.length - 1; i++) {
                segs.push([{ x: waypoints[i].x, y: waypoints[i].y }, { x: waypoints[i + 1].x, y: waypoints[i + 1].y }]);
            }
            if (autoClose && waypoints.length >= 3) {
                segs.push([{ x: waypoints[waypoints.length - 1].x, y: waypoints[waypoints.length - 1].y }, { x: waypoints[0].x, y: waypoints[0].y }]);
            }
        }
        auxConnections.forEach((conn, idx) => {
            const ap = auxPoints[idx];
            conn.forEach(wlbl => {
                const wp = waypoints.find(w => w.label === wlbl);
                if (wp) segs.push([{ x: ap.x, y: ap.y }, { x: wp.x, y: wp.y }]);
            });
        });
        const WORLD_LENGTH = 1e6;
        auxDirLines.forEach(dl => {
            const wp = waypoints.find(w => w.label === dl.vertexLabel);
            if (wp) {
                const rad = toRad(90 - dl.angle);
                const ex = wp.x + WORLD_LENGTH * Math.cos(rad);
                const ey = wp.y - WORLD_LENGTH * Math.sin(rad);
                segs.push([{ x: wp.x, y: wp.y }, { x: ex, y: ey }]);
            }
        });
        const allPts = [];
        auxCircles.forEach(c => {
            let center;
            if (c.centerType === 'vertex') center = waypoints.find(w => w.label === c.centerRef);
            else center = auxPoints[c.centerRef];
            if (!center) return;
            segs.forEach(seg => {
                const pts = lineCircleIntersections(seg[0], seg[1], center, c.radius);
                allPts.push(...pts);
            });
        });
        for (let i = 0; i < segs.length; i++) {
            for (let j = i + 1; j < segs.length; j++) {
                const inter = segmentIntersection(segs[i][0], segs[i][1], segs[j][0], segs[j][1]);
                if (inter) allPts.push(inter);
            }
        }
        const existing = waypoints.map(w => ({ x: w.x, y: w.y }));
        return allPts.filter(pt => !existing.some(e => dist(pt.x, pt.y, e.x, e.y) < 5));
    }

    function lineCircleIntersections(p1, p2, center, radius) {
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const fx = p1.x - center.x, fy = p1.y - center.y;
        const a = dx * dx + dy * dy;
        if (a === 0) {
            if (Math.hypot(fx, fy) <= radius + 1e-6) return [{ x: p1.x, y: p1.y }];
            return [];
        }
        const b = 2 * (fx * dx + fy * dy);
        const c = fx * fx + fy * fy - radius * radius;
        const disc = b * b - 4 * a * c;
        if (disc < 0) return [];
        const sqrtDisc = Math.sqrt(disc);
        const t1 = (-b - sqrtDisc) / (2 * a), t2 = (-b + sqrtDisc) / (2 * a);
        const pts = [];
        if (t1 >= 0 && t1 <= 1) pts.push({ x: p1.x + dx * t1, y: p1.y + dy * t1 });
        if (t2 >= 0 && t2 <= 1) pts.push({ x: p1.x + dx * t2, y: p1.y + dy * t2 });
        return pts;
    }

    function segmentIntersection(p1, p2, p3, p4) {
        const denom = (p1.x - p2.x) * (p3.y - p4.y) - (p1.y - p2.y) * (p3.x - p4.x);
        if (Math.abs(denom) < 1e-12) return null;
        const t = ((p1.x - p3.x) * (p3.y - p4.y) - (p1.y - p3.y) * (p3.x - p4.x)) / denom;
        const u = -((p1.x - p2.x) * (p1.y - p3.y) - (p1.y - p2.y) * (p1.x - p3.x)) / denom;
        if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
            return { x: p1.x + t * (p2.x - p1.x), y: p1.y + t * (p2.y - p1.y) };
        }
        return null;
    }

    function updateIntersectionsCache() {
        if (dirtyIntersections) {
            intersectionsCache = computeAllIntersections();
            dirtyIntersections = false;
        }
    }

    // ========== 球面坐标计算 ==========
    function computeDestination(lat, lng, bearingDeg, distanceM) {
        const R = 6371000;
        const lat1 = lat * Math.PI / 180;
        const lng1 = lng * Math.PI / 180;
        const bearing = bearingDeg * Math.PI / 180;
        const dR = distanceM / R;
        const lat2 = Math.asin(Math.sin(lat1) * Math.cos(dR) +
                              Math.cos(lat1) * Math.sin(dR) * Math.cos(bearing));
        const lng2 = lng1 + Math.atan2(Math.sin(bearing) * Math.sin(dR) * Math.cos(lat1),
                                       Math.cos(dR) - Math.sin(lat1) * Math.sin(lat2));
        return { lat: lat2 * 180 / Math.PI, lng: lng2 * 180 / Math.PI };
    }

    // ========== 绘图（完整原功能） ==========
    function refreshCanvas() {
        drawCanvas();
        updateRotateCombos();
        updateCircleListbox();
        updateWaypointList();
    }

    function drawCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        const cw = canvas.width, ch = canvas.height;
        ctx.clearRect(0, 0, cw, ch);
        ctx.fillStyle = '#f5f5f5'; ctx.fillRect(0, 0, cw, ch);
        // 网格
        const gs = 50 * scale;
        const ox = panOffset[0] % gs, oy = panOffset[1] % gs;
        ctx.strokeStyle = '#d0d0d0'; ctx.lineWidth = 1;
        for (let x = ox; x < cw; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke(); }
        for (let y = oy; y < ch; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke(); }
        // 罗盘（右上角）
        const r = 45, cxr = cw - r - 10, cyr = r + 10;
        ctx.strokeStyle = '#7f8c8d'; ctx.beginPath(); ctx.arc(cxr, cyr, r, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr-r, cyr); ctx.lineTo(cxr+r, cyr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr, cyr-r); ctx.lineTo(cxr, cyr+r); ctx.stroke();
        for (let deg=0; deg<360; deg+=45) {
            const rad = toRad(90-deg);
            ctx.beginPath(); ctx.moveTo(cxr+(r-4)*Math.cos(rad), cyr-(r-4)*Math.sin(rad));
            ctx.lineTo(cxr+r*Math.cos(rad), cyr-r*Math.sin(rad)); ctx.stroke();
        }
        ctx.font = 'bold 12px Arial'; ctx.fillStyle = '#2c3e50';
        ['N','E','S','W'].forEach((t,i) => {
            const angles = [0,90,180,270], rad = toRad(90-angles[i]);
            ctx.fillText(t, cxr+(r+12)*Math.cos(rad), cyr-(r+12)*Math.sin(rad));
        });
        // 航线
        const edges = getAllEdges();
        edges.forEach(({i1,i2}) => {
            const sp1 = worldToScreen(waypoints[i1].x, waypoints[i1].y);
            const sp2 = worldToScreen(waypoints[i2].x, waypoints[i2].y);
            let color = '#2980b9';
            if (selectedEdges.length>=1 && ((selectedEdges[0].i1===i1&&selectedEdges[0].i2===i2)||(selectedEdges[0].i1===i2&&selectedEdges[0].i2===i1))) color='#e74c3c';
            else if (selectedEdges.length>=2 && ((selectedEdges[1].i1===i1&&selectedEdges[1].i2===i2)||(selectedEdges[1].i1===i2&&selectedEdges[1].i2===i1))) color='#f1c40f';
            ctx.strokeStyle=color; ctx.lineWidth=4;
            ctx.beginPath(); ctx.moveTo(sp1.x,sp1.y); ctx.lineTo(sp2.x,sp2.y); ctx.stroke();
        });
        // 航点
        waypoints.forEach((wp,i)=>{
            const sp = worldToScreen(wp.x,wp.y);
            const color = wp.label==='H'?'#e74c3c':(i===selectedWaypointIndex?'#f39c12':'#3498db');
            const rw = (wp.label==='H'||i===selectedWaypointIndex)?14:11;
            ctx.fillStyle=color; ctx.beginPath(); ctx.arc(sp.x,sp.y,rw,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='#2980b9'; ctx.lineWidth=2; ctx.stroke();
            ctx.fillStyle='#2c3e50'; ctx.font=`bold ${wp.label==='H'?15:13}px Arial`;
            ctx.textAlign='center'; ctx.fillText(wp.label,sp.x,sp.y-20);
            if(waypoints.length>=3){
                const prev=waypoints[(i-1+waypoints.length)%waypoints.length], next=waypoints[(i+1)%waypoints.length];
                const ang=calcAngleAtVertex(prev,wp,next);
                ctx.font='9px Arial'; ctx.fillText(`内:${ang.toFixed(1)}°`,sp.x,sp.y+15);
            }
        });
        // 辅助方向线
        auxDirLines.forEach(dl => {
            const wp = waypoints.find(w => w.label === dl.vertexLabel);
            if (!wp) return;
            const sp = worldToScreen(wp.x, wp.y);
            const rad = toRad(90 - dl.angle);
            const wx = wp.x + 1e6 * Math.cos(rad), wy = wp.y - 1e6 * Math.sin(rad);
            const ep = worldToScreen(wx, wy);
            ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.beginPath(); ctx.moveTo(sp.x, sp.y); ctx.lineTo(ep.x, ep.y); ctx.stroke();
            ctx.setLineDash([]);
        });
        // 辅助圆
        auxCircles.forEach(c => {
            let center;
            if (c.centerType === 'vertex') center = waypoints.find(w => w.label === c.centerRef);
            else center = auxPoints[c.centerRef];
            if (!center) return;
            const sp = worldToScreen(center.x, center.y);
            const rp = c.radius * scale;
            ctx.strokeStyle = 'green'; ctx.lineWidth = 2;
            ctx.setLineDash([4, 2]);
            ctx.beginPath(); ctx.arc(sp.x, sp.y, rp, 0, Math.PI*2); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'green'; ctx.font = 'bold 9px Arial';
            ctx.fillText(`${Math.round(c.radius)}m`, sp.x, sp.y);
        });
        // 交点
        if (showIntersections) {
            updateIntersectionsCache();
            intersectionsCache.forEach(pt => {
                const sp = worldToScreen(pt.x, pt.y);
                ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(sp.x-5, sp.y); ctx.lineTo(sp.x+5, sp.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(sp.x, sp.y-5); ctx.lineTo(sp.x, sp.y+5); ctx.stroke();
            });
        }
        // 辅助点
        auxPoints.forEach((ap, idx) => {
            const sp = worldToScreen(ap.x, ap.y);
            ctx.fillStyle = '#9400d3'; ctx.beginPath(); ctx.arc(sp.x, sp.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#adff2f'; ctx.font = 'bold 8px Arial'; ctx.fillText(ap.label, sp.x+10, sp.y-10);
            const conn = auxConnections.get(idx) || new Set();
            conn.forEach(wlbl => {
                const wp = waypoints.find(w => w.label === wlbl);
                if (!wp) return;
                const ep = worldToScreen(wp.x, wp.y);
                ctx.strokeStyle = 'orange'; ctx.lineWidth = 2;
                ctx.setLineDash([5, 3]);
                ctx.beginPath(); ctx.moveTo(sp.x, sp.y); ctx.lineTo(ep.x, ep.y); ctx.stroke();
                ctx.setLineDash([]);
                const d = dist(ap.x, ap.y, wp.x, wp.y);
                const az = azimuth(ap.x, ap.y, wp.x, wp.y);
                const mx = (sp.x+ep.x)/2, my = (sp.y+ep.y)/2;
                ctx.fillStyle = '#e67e22'; ctx.font = 'bold 7px Arial';
                ctx.fillText(`${az.toFixed(0)}° ${d.toFixed(1)}m`, mx, my-8);
            });
        });
        updateStatusMessage();
        ctx.fillStyle = 'gray'; ctx.font = '12px Arial';
        ctx.fillText(`缩放:${scale.toFixed(2)}x`, cw-70, ch-15);
        if (waypoints.length === 0 && auxPoints.length === 0 && !addMode) {
            hint.style.display = 'block';
        } else {
            hint.style.display = 'none';
        }
    }

    function getAllEdges() {
        const e = [];
        if (waypoints.length >= 2) {
            for (let i = 0; i < waypoints.length - 1; i++) e.push({ i1: i, i2: i + 1 });
            if (autoClose && waypoints.length >= 3) e.push({ i1: waypoints.length - 1, i2: 0 });
        }
        return e;
    }

    function calcAngleAtVertex(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
        const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y;
        const m1 = Math.hypot(v1.x, v1.y), m2 = Math.hypot(v2.x, v2.y);
        if (m1 === 0 || m2 === 0) return 0;
        return toDeg(Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))));
    }

    function updateStatusMessage() {
        if (selectedEdges.length === 2) {
            const e1 = selectedEdges[0], e2 = selectedEdges[1];
            let common = null;
            if (e1.i1 === e2.i1 || e1.i1 === e2.i2) common = e1.i1;
            else if (e1.i2 === e2.i1 || e1.i2 === e2.i2) common = e1.i2;
            if (common != null) {
                const other1 = (common === e1.i1) ? waypoints[e1.i2] : waypoints[e1.i1];
                const other2 = (common === e2.i1) ? waypoints[e2.i2] : waypoints[e2.i1];
                const ang = calcAngleAtVertex(other1, waypoints[common], other2);
                statusBar.textContent = `夹角: ${ang.toFixed(1)}° (点击修改)`;
                return;
            }
        }
        statusBar.textContent = `航点: ${waypoints.length} | 缩放:${scale.toFixed(1)}`;
    }

    // 状态栏点击修改夹角
    function modifySelectedAngle() {
        if (selectedEdges.length !== 2) return;
        const e1 = selectedEdges[0], e2 = selectedEdges[1];
        let common = null;
        if (e1.i1 === e2.i1 || e1.i1 === e2.i2) common = e1.i1;
        else if (e1.i2 === e2.i1 || e1.i2 === e2.i2) common = e1.i2;
        if (common == null) return;
        const redOther = (common === e1.i1) ? e1.i2 : e1.i1;
        const yellowOther = (common === e2.i1) ? e2.i2 : e2.i1;
        const curAng = calcAngleAtVertex(waypoints[redOther], waypoints[common], waypoints[yellowOther]);
        const newAng = prompt(`当前内角 ${curAng.toFixed(1)}°，输入新角度（0-180）：`, curAng.toFixed(1));
        if (newAng === null || isNaN(newAng)) return;
        const angle = parseFloat(newAng);
        const pc = waypoints[common], py = waypoints[yellowOther], pr = waypoints[redOther];
        const vy = { x: py.x - pc.x, y: py.y - pc.y };
        const vr = { x: pr.x - pc.x, y: pr.y - pc.y };
        const ly = Math.hypot(vy.x, vy.y), lr = Math.hypot(vr.x, vr.y);
        if (ly === 0 || lr === 0) return;
        const cross = vy.x * vr.y - vy.y * vr.x;
        const targetRad = (cross >= 0 ? 1 : -1) * toRad(angle);
        const curRad = Math.atan2(cross, vy.x*vr.x + vy.y*vr.y);
        const rot = targetRad - curRad;
        const cosR = Math.cos(rot), sinR = Math.sin(rot);
        const newVr = { x: vr.x * cosR - vr.y * sinR, y: vr.x * sinR + vr.y * cosR };
        const vlen = Math.hypot(newVr.x, newVr.y);
        if (vlen > 1e-12) { newVr.x *= lr / vlen; newVr.y *= lr / vlen; }
        saveState();
        waypoints[redOther].x = pc.x + newVr.x;
        waypoints[redOther].y = pc.y + newVr.y;
        refreshCanvas();
    }

    // ========== 旋转 ==========
    function updateRotateCombos() {
        const startSel = document.getElementById('rotateStart');
        const endSel = document.getElementById('rotateEnd');
        if (startSel && endSel) {
            const labels = waypoints.map(w => w.label);
            startSel.innerHTML = endSel.innerHTML = labels.map(l => `<option>${l}</option>`).join('');
        }
    }
    function rotateRoute() {
        const startLabel = document.getElementById('rotateStart').value;
        const endLabel = document.getElementById('rotateEnd').value;
        const target = parseFloat(document.getElementById('rotateTarget').value);
        if (isNaN(target)) return;
        const start = waypoints.find(w => w.label === startLabel);
        const end = waypoints.find(w => w.label === endLabel);
        if (!start || !end) return;
        const curAz = azimuth(start.x, start.y, end.x, end.y);
        const delta = target - curAz;
        const cx = start.x, cy = start.y;
        const rad = toRad(delta);
        const cosA = Math.cos(rad), sinA = Math.sin(rad);
        saveState();
        waypoints.forEach(wp => {
            const dx = wp.x - cx, dy = wp.y - cy;
            wp.x = cx + dx * cosA - dy * sinA;
            wp.y = cy + dx * sinA + dy * cosA;
        });
        refreshCanvas();
    }

    // ========== 相对坐标 / 航线生成 ==========
    function openRelativePanel() {
        document.getElementById('relativePanel').classList.add('open');
        if (!document.getElementById('baseLat').value) {
            const center = screenToWorld(canvas.width/2, canvas.height/2);
            document.getElementById('baseLat').value = center.y.toFixed(6);
            document.getElementById('baseLng').value = center.x.toFixed(6);
        }
    }
    function closeRelativePanel() {
        document.getElementById('relativePanel').classList.remove('open');
        pickingBase = false;
    }
    function openToolbox() {
        updateRotateCombos();
        document.getElementById('toolboxPanel').classList.add('open');
    }
    function closeToolbox() {
        document.getElementById('toolboxPanel').classList.remove('open');
    }

    function pickBaseFromMap() {
        pickingBase = true;
        closeRelativePanel();
        alert('请在地图上点击一个点作为基准点');
    }

    function generateFromRelative() {
        const baseLat = parseFloat(document.getElementById('baseLat').value);
        const baseLng = parseFloat(document.getElementById('baseLng').value);
        const baseAlt = parseFloat(document.getElementById('baseAlt').value) || 50;
        const text = document.getElementById('segmentList').value.trim();
        if (isNaN(baseLat) || isNaN(baseLng)) { alert('请输入有效基准点经纬度'); return; }
        if (!text) { alert('请输入至少一个航段'); return; }
        // 添加基准点
        addWaypoint(baseLng, baseLat);
        let curLat = baseLat, curLng = baseLng, curAlt = baseAlt;
        const lines = text.split('\n').filter(l => l.trim() !== '');
        for (const line of lines) {
            const parts = line.split(',').map(s => parseFloat(s.trim()));
            if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) {
                alert(`航段格式错误: ${line}`); return;
            }
            const bearing = parts[0];
            const distance = parts[1];
            const alt = parts.length >= 3 && !isNaN(parts[2]) ? parts[2] : curAlt;
            const dest = computeDestination(curLat, curLng, bearing, distance);
            addWaypoint(dest.lng, dest.lat);
            curLat = dest.lat; curLng = dest.lng; curAlt = alt;
        }
        closeRelativePanel();
        alert('连续航点已生成');
    }

    // ========== 航点列表 ==========
    function showWaypointList() {
        document.getElementById('waypoint-list').classList.toggle('visible');
        updateWaypointList();
    }
    function updateWaypointList() {
        const div = document.getElementById('waypoint-list');
        div.innerHTML = waypoints.map((wp,i) => `<div onclick="selectWaypoint(${i})">${wp.label} (${wp.params.height}m)</div>`).join('');
    }
    function selectWaypoint(index) {
        selectedWaypointIndex = index;
        document.getElementById('waypoint-list').classList.remove('visible');
        refreshCanvas();
    }

    function updateCircleListbox() {
        const list = document.getElementById('circleList');
        if (list) list.innerHTML = auxCircles.map((c,i) => `<div>圆${i+1} R=${c.radius}m</div>`).join('');
    }

    // ========== 触摸事件 ==========
    function getCanvasTouch(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (e.touches.length === 2) {
            touchMode = 'pinch';
            pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            pinchStartScale = scale;
            return;
        }
        if (touchMode === 'pinch') return;
        const pt = getCanvasTouch(e);
        const world = screenToWorld(pt.x, pt.y);
        if (pickingBase) {
            pickingBase = false;
            document.getElementById('baseLat').value = world.y.toFixed(6);
            document.getElementById('baseLng').value = world.x.toFixed(6);
            openRelativePanel();
            return;
        }
        clearLongPress();
        const auxIdx = getNearbyAux(world.x, world.y);
        if (auxIdx >= 0) {
            touchMode = 'drag-aux';
            draggingAuxIndex = auxIdx;
            return;
        }
        for (let i = 0; i < waypoints.length; i++) {
            const wp = waypoints[i];
            if (dist(world.x, world.y, wp.x, wp.y) <= 15/scale) {
                touchMode = 'drag-waypoint';
                draggingWaypointIndex = i;
                selectedWaypointIndex = i;
                longPressTarget = { type: 'waypoint', index: i };
                startLongPress(e.touches[0]);
                refreshCanvas();
                return;
            }
        }
        const edges = getAllEdges();
        for (const edge of edges) {
            if (pointToSegmentDist(world.x, world.y, waypoints[edge.i1].x, waypoints[edge.i1].y, waypoints[edge.i2].x, waypoints[edge.i2].y) <= 12/scale) {
                toggleEdgeSelection(edge);
                refreshCanvas();
                touchMode = 'idle';
                return;
            }
        }
        if (showIntersections) {
            updateIntersectionsCache();
            for (const inter of intersectionsCache) {
                if (dist(world.x, world.y, inter.x, inter.y) <= 12/scale) {
                    addWaypoint(inter.x, inter.y);
                    return;
                }
            }
        }
        touchMode = 'pan';
        panStart = { x: pt.x, y: pt.y, offsetX: panOffset[0], offsetY: panOffset[1] };
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (touchMode === 'pinch' && e.touches.length === 2) {
            const curDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (pinchStartDist) {
                const factor = curDist / pinchStartDist;
                const newScale = Math.min(20, Math.max(0.1, pinchStartScale * factor));
                scale = newScale;
                refreshCanvas();
            }
            pinchStartDist = curDist;
            return;
        }
        if (touchMode === 'drag-waypoint' || touchMode === 'drag-aux') {
            const pt = getCanvasTouch(e);
            const world = screenToWorld(pt.x, pt.y);
            if (touchMode === 'drag-waypoint') {
                waypoints[draggingWaypointIndex].x = world.x;
                waypoints[draggingWaypointIndex].y = world.y;
                updateAuxConnections();
            } else {
                auxPoints[draggingAuxIndex].x = world.x;
                auxPoints[draggingAuxIndex].y = world.y;
                updateAuxConnections();
            }
            clearLongPress();
            refreshCanvas();
        } else if (touchMode === 'pan') {
            const pt = getCanvasTouch(e);
            panOffset[0] = panStart.offsetX + (pt.x - panStart.x);
            panOffset[1] = panStart.offsetY + (pt.y - panStart.y);
            refreshCanvas();
        }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        clearLongPress();
        if (touchMode === 'drag-waypoint') saveState();
        if (touchMode === 'pinch') pinchStartDist = null;
        const now = Date.now();
        if (touchMode === 'idle' || touchMode === 'pan') {
            const pt = getCanvasTouch(e);
            if (lastTapPos && Math.abs(pt.x - lastTapPos.x) < 15 && Math.abs(pt.y - lastTapPos.y) < 15 && now - lastTapTime < 300) {
                const world = screenToWorld(pt.x, pt.y);
                addWaypoint(world.x, world.y);
                lastTapTime = 0;
            } else {
                lastTapTime = now;
                lastTapPos = { x: pt.x, y: pt.y };
            }
        }
        touchMode = 'idle';
    });

    function startLongPress(touch) {
        clearLongPress();
        longPressTimer = setTimeout(() => {
            if (longPressTarget && longPressTarget.type === 'waypoint') {
                showWaypointMenu(longPressTarget.index);
            }
            longPressTarget = null;
        }, 500);
    }
    function clearLongPress() { if (longPressTimer) clearTimeout(longPressTimer); }
    function showWaypointMenu(index) {
        const action = prompt(`航点 ${waypoints[index].label}:\n1.删除\n2.辅助圆\n3.方向线`, '');
        if (action === '1') deleteWaypoint(index);
        else if (action === '2') addCircleForVertex(index);
        else if (action === '3') addDirectionLine(index);
    }

    function toggleEdgeSelection(edge) {
        const pair = { i1: edge.i1, i2: edge.i2 };
        const exists = selectedEdges.findIndex(e => (e.i1===pair.i1&&e.i2===pair.i2)||(e.i1===pair.i2&&e.i2===pair.i1));
        if (exists >= 0) selectedEdges.splice(exists, 1);
        else {
            if (selectedEdges.length >= 2) selectedEdges.shift();
            selectedEdges.push(pair);
        }
    }

    function toggleAddMode() {
        addMode = !addMode;
        const btn = document.getElementById('addBtn');
        btn.style.background = addMode ? '#34c759' : '#0a84ff';
        btn.textContent = addMode ? '✓' : '＋';
    }

    canvas.addEventListener('click', (e) => {
        if (addMode) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            const world = screenToWorld(x, y);
            addWaypoint(world.x, world.y);
        }
    });

    document.getElementById('showIntersectionsCheck').addEventListener('change', (e) => {
        showIntersections = e.target.checked;
        refreshCanvas();
    });

    statusBar.addEventListener('click', modifySelectedAngle);

    // 初始化
    saveState();
    refreshCanvas();
</script>
</body>
