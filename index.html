<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAAC 地面站综合工具 - 网页版</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #2d2d2d;
            --entry: #3c3c3c;
            --fg: #f0f0f0;
            --accent: #0078d7;
            --btn-bg: #3c3c3c;
            --btn-fg: #f0f0f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #left-panel {
            width: 380px;
            background: var(--panel);
            padding: 10px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #444;
            overflow-y: auto;
        }
        #left-panel h2 { font-size: 1.2rem; margin-bottom: 10px; color: var(--accent); }
        .group {
            background: #252525;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .group label { display: block; margin-bottom: 4px; font-size: 0.9rem; }
        button, select, input[type="number"] {
            background: var(--btn-bg);
            color: var(--btn-fg);
            border: 1px solid #555;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover { background: var(--accent); }
        .row { display: flex; align-items: center; gap: 5px; margin: 4px 0; }
        #canvas-container {
            flex: 1;
            position: relative;
            background: white;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: #2d2d2d;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            border-top: 1px solid #444;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 50%; top: 50%;
            transform: translate(-50%,-50%);
            background: #2d2d2d;
            padding: 20px;
            border: 1px solid #555;
            border-radius: 8px;
            min-width: 300px;
        }
        .modal input[type="number"] { width: 80px; }
        .modal .row { margin: 8px 0; }
        .modal button { margin-right: 8px; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; }
        select { width: 80px; }
    </style>
</head>
<body>
<div id="left-panel">
    <h2>操作</h2>
    <div class="group">
        <button onclick="openRelativeDialog()">相对坐标编辑器</button>
        <button onclick="resetView()">重置视图</button>
        <button onclick="deleteSelectedWaypoint()">删除选中航点</button>
        <button onclick="clearAllWaypoints()">删除所有航点</button>
        <label class="checkbox-label">
            <input type="checkbox" id="autoCloseCheck" onchange="toggleAutoClose()"> 自动闭合航线
        </label>
    </div>
    <div class="group">
        <h3>航线旋转</h3>
        <div class="row">
            <label>起始点:</label>
            <select id="rotateStart"></select>
            <label>终点:</label>
            <select id="rotateEnd"></select>
        </div>
        <div class="row">
            <label>目标航向(°):</label>
            <input type="number" id="rotateTarget" value="0" style="width:80px;">
            <button onclick="rotateRoute()">旋转</button>
        </div>
    </div>
    <div class="group">
        <h3>辅助工具</h3>
        <button onclick="clearAllCircles()">清空所有圆</button>
        <div style="height:100px; overflow-y:auto; border:1px solid #555; margin:4px 0; padding:2px;" id="circleList"></div>
        <button onclick="deleteSelectedCircle()">删除选中圆</button>
        <label class="checkbox-label">
            <input type="checkbox" id="showIntersectionsCheck" onchange="refreshCanvas()"> 显示交点 (单击添加)
        </label>
    </div>
    <div style="font-size:0.8rem; color:gray; margin-top:8px;">
        Shift+双击画布添加辅助点<br>
        右击航点添加辅助方向线<br>
        点击线段选中（红/黄），状态栏显示夹角，单击状态栏修改
    </div>
</div>
<div id="canvas-container">
    <canvas id="mainCanvas"></canvas>
    <div id="status-bar" onclick="modifySelectedAngle()">就绪</div>
</div>
<!-- 相对坐标编辑器弹窗 -->
<div id="relativeModal" class="modal">
    <h3>相对坐标编辑器</h3>
    <div class="row">
        <label>基准点:</label>
        <select id="basePointSelect"></select>
    </div>
    <div class="row">
        <label>方位角(°):</label>
        <input type="number" id="relAzimuth" value="0">
    </div>
    <div class="row">
        <label>距离(米):</label>
        <input type="number" id="relDistance" value="100">
    </div>
    <div class="row">
        <label>新标签:</label>
        <input type="text" id="relLabel" value="">
    </div>
    <button onclick="addWaypointByRelative()">添加航点</button>
    <button onclick="closeRelativeDialog()">关闭</button>
</div>

<script>
    // ==================== 全局状态 ====================
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const statusBar = document.getElementById('status-bar');

    let waypoints = [];                 // {x, y, label, params}
    let selectedWaypointIndex = null;
    let auxPoints = [];                // {x, y, label}
    let auxConnections = new Map();    // index -> Set(waypointLabel)
    let auxCircles = [];              // {centerType:'vertex'|'aux', centerRef, radius}
    let auxDirLines = [];             // {vertexLabel, angle}
    let scale = 1.0;
    let panOffset = [0, 0];
    let draggingWaypoint = null;
    let draggingAux = null;
    let panning = false;
    let panStart = null;
    let autoClose = false;
    let selectedEdges = [];            // [{i1, i2}]
    const edgeThreshold = 10;
    let showIntersections = false;
    let dirtyIntersections = true;
    let intersectionsCache = [];
    let history = [];
    let historyIndex = -1;
    let selectedAuxIndices = [];

    // ==================== 工具函数 ====================
    function toRad(deg) { return deg * Math.PI / 180; }
    function toDeg(rad) { return rad * 180 / Math.PI; }
    function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
    function azimuth(x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (Math.abs(dx) < 1e-12 && Math.abs(dy) < 1e-12) return 0;
        return (toDeg(Math.atan2(dx, dy)) + 360) % 360;
    }
    function pointToSegmentDist(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (dx === 0 && dy === 0) return Math.hypot(px - x1, py - y1);
        const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
        return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
    }

    // ==================== 历史记录 ====================
    function saveState() {
        const state = JSON.parse(JSON.stringify(waypoints));
        if (historyIndex < history.length - 1) {
            history = history.slice(0, historyIndex + 1);
        }
        history.push(state);
        historyIndex = history.length - 1;
        if (history.length > 50) { history.shift(); historyIndex--; }
        dirtyIntersections = true;
    }
    function undo() {
        if (historyIndex > 0) {
            historyIndex--;
            waypoints = JSON.parse(JSON.stringify(history[historyIndex]));
            selectedWaypointIndex = null;
            refreshCanvas();
        }
    }
    function redo() {
        if (historyIndex < history.length - 1) {
            historyIndex++;
            waypoints = JSON.parse(JSON.stringify(history[historyIndex]));
            selectedWaypointIndex = null;
            refreshCanvas();
        }
    }

    // ==================== 坐标转换 ====================
    function worldToScreen(wx, wy) {
        return {
            x: wx * scale + panOffset[0],
            y: wy * scale + panOffset[1]
        };
    }
    function screenToWorld(sx, sy) {
        return {
            x: (sx - panOffset[0]) / scale,
            y: (sy - panOffset[1]) / scale
        };
    }

    // ==================== 航点操作 ====================
    function getNextLabel() {
        let maxNum = 0;
        waypoints.forEach(wp => {
            if (wp.label !== 'H') {
                const n = parseInt(wp.label);
                if (!isNaN(n) && n > maxNum) maxNum = n;
            }
        });
        return String(maxNum + 1);
    }

    function addWaypoint(x, y, label) {
        saveState();
        const hasH = waypoints.some(wp => wp.label === 'H');
        const has1 = waypoints.some(wp => wp.label === '1');
        if (!label) {
            label = !hasH ? 'H' : (!has1 ? '1' : getNextLabel());
        }
        waypoints.push({ x, y, label, params: { height: 100, verticalSpeed: 5, horizontalSpeed: 15, turnMode: '曲线飞行' } });
        dirtyIntersections = true;
        refreshCanvas();
    }

    function deleteWaypoint(index) {
        if (index == null || index >= waypoints.length) return;
        const label = waypoints[index].label;
        if (label === 'H' && confirm('删除H点会清空所有航点，确定？')) {
            clearAllWaypoints();
            return;
        }
        saveState();
        waypoints.splice(index, 1);
        auxConnections.forEach(conn => conn.delete(label));
        selectedWaypointIndex = null;
        refreshCanvas();
    }

    function clearAllWaypoints() {
        if (waypoints.length === 0 || !confirm('确定清空所有航点？')) return;
        saveState();
        waypoints = [];
        auxConnections.forEach(conn => conn.clear());
        refreshCanvas();
    }

    function deleteSelectedWaypoint() {
        deleteWaypoint(selectedWaypointIndex);
    }

    function toggleAutoClose() {
        autoClose = document.getElementById('autoCloseCheck').checked;
        refreshCanvas();
    }

    // ==================== 辅助点管理 ====================
    function addAuxPoint(x, y) {
        const label = `A${auxPoints.length + 1}`;
        auxPoints.push({ x, y, label });
        auxConnections.set(auxPoints.length - 1, new Set());
        dirtyIntersections = true;
        refreshCanvas();
    }

    function updateAuxConnections() {
        const th = 20 / scale;
        auxPoints.forEach((ap, idx) => {
            const conn = auxConnections.get(idx) || new Set();
            waypoints.forEach(wp => {
                if (!conn.has(wp.label) && dist(ap.x, ap.y, wp.x, wp.y) <= th) {
                    conn.add(wp.label);
                }
            });
            auxConnections.set(idx, conn);
        });
        dirtyIntersections = true;
    }

    function getNearbyAux(wx, wy) {
        const th = 20 / scale;
        for (let i = 0; i < auxPoints.length; i++) {
            if (dist(wx, wy, auxPoints[i].x, auxPoints[i].y) <= th) return i;
        }
        return -1;
    }

    // ==================== 辅助圆 ====================
    function addCircleForVertex(index) {
        const radius = prompt('输入半径（米）:', '100');
        if (!radius || isNaN(radius) || radius <= 0) return;
        auxCircles.push({ centerType: 'vertex', centerRef: waypoints[index].label, radius: parseFloat(radius) });
        dirtyIntersections = true;
        refreshCanvas();
    }
    function addCircleForAux(index) {
        const radius = prompt('输入半径（米）:', '100');
        if (!radius || isNaN(radius) || radius <= 0) return;
        auxCircles.push({ centerType: 'aux', centerRef: index, radius: parseFloat(radius) });
        dirtyIntersections = true;
        refreshCanvas();
    }
    function clearAllCircles() {
        auxCircles = [];
        dirtyIntersections = true;
        refreshCanvas();
    }
    function deleteSelectedCircle() {
        const list = document.getElementById('circleList').children;
        for (let i = 0; i < list.length; i++) {
            if (list[i].classList.contains('selected')) {
                auxCircles.splice(i, 1);
                break;
            }
        }
        dirtyIntersections = true;
        refreshCanvas();
    }

    // ==================== 方向线 ====================
    function addDirectionLine(index) {
        const angle = prompt('输入方向角度（0-360°）:', '315');
        if (angle === null || isNaN(angle)) return;
        auxDirLines.push({ vertexLabel: waypoints[index].label, angle: parseFloat(angle) });
        dirtyIntersections = true;
        refreshCanvas();
    }

    // ==================== 交点计算 ====================
    function computeAllIntersections() {
        const segs = [];
        if (waypoints.length >= 2) {
            for (let i = 0; i < waypoints.length - 1; i++) {
                segs.push([{ x: waypoints[i].x, y: waypoints[i].y }, { x: waypoints[i + 1].x, y: waypoints[i + 1].y }]);
            }
            if (autoClose && waypoints.length >= 3) {
                segs.push([{ x: waypoints[waypoints.length - 1].x, y: waypoints[waypoints.length - 1].y }, { x: waypoints[0].x, y: waypoints[0].y }]);
            }
        }
        auxConnections.forEach((conn, idx) => {
            const ap = auxPoints[idx];
            conn.forEach(wlbl => {
                const wp = waypoints.find(w => w.label === wlbl);
                if (wp) segs.push([{ x: ap.x, y: ap.y }, { x: wp.x, y: wp.y }]);
            });
        });
        const WORLD_LENGTH = 1e6;
        auxDirLines.forEach(dl => {
            const wp = waypoints.find(w => w.label === dl.vertexLabel);
            if (wp) {
                const rad = toRad(90 - dl.angle);
                const ex = wp.x + WORLD_LENGTH * Math.cos(rad);
                const ey = wp.y - WORLD_LENGTH * Math.sin(rad);
                segs.push([{ x: wp.x, y: wp.y }, { x: ex, y: ey }]);
            }
        });
        const allPts = [];
        auxCircles.forEach(c => {
            let center;
            if (c.centerType === 'vertex') {
                center = waypoints.find(w => w.label === c.centerRef);
            } else {
                center = auxPoints[c.centerRef];
            }
            if (!center) return;
            segs.forEach(seg => {
                const pts = lineCircleIntersections(seg[0], seg[1], center, c.radius);
                allPts.push(...pts);
            });
        });
        // 线段间交点
        for (let i = 0; i < segs.length; i++) {
            for (let j = i + 1; j < segs.length; j++) {
                const inter = segmentIntersection(segs[i][0], segs[i][1], segs[j][0], segs[j][1]);
                if (inter) allPts.push(inter);
            }
        }
        const existing = waypoints.map(w => ({ x: w.x, y: w.y }));
        const filtered = allPts.filter(pt => !existing.some(e => dist(pt.x, pt.y, e.x, e.y) < 5));
        return filtered;
    }

    function lineCircleIntersections(p1, p2, center, radius) {
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const fx = p1.x - center.x, fy = p1.y - center.y;
        const a = dx * dx + dy * dy;
        if (a === 0) {
            if (Math.hypot(fx, fy) <= radius + 1e-6) return [{ x: p1.x, y: p1.y }];
            return [];
        }
        const b = 2 * (fx * dx + fy * dy);
        const c = fx * fx + fy * fy - radius * radius;
        const disc = b * b - 4 * a * c;
        if (disc < 0) return [];
        const sqrtDisc = Math.sqrt(disc);
        const t1 = (-b - sqrtDisc) / (2 * a), t2 = (-b + sqrtDisc) / (2 * a);
        const pts = [];
        if (t1 >= 0 && t1 <= 1) pts.push({ x: p1.x + dx * t1, y: p1.y + dy * t1 });
        if (t2 >= 0 && t2 <= 1) pts.push({ x: p1.x + dx * t2, y: p1.y + dy * t2 });
        return pts;
    }

    function segmentIntersection(p1, p2, p3, p4) {
        const denom = (p1.x - p2.x) * (p3.y - p4.y) - (p1.y - p2.y) * (p3.x - p4.x);
        if (Math.abs(denom) < 1e-12) return null;
        const t = ((p1.x - p3.x) * (p3.y - p4.y) - (p1.y - p3.y) * (p3.x - p4.x)) / denom;
        const u = -((p1.x - p2.x) * (p1.y - p3.y) - (p1.y - p2.y) * (p1.x - p3.x)) / denom;
        if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
            return { x: p1.x + t * (p2.x - p1.x), y: p1.y + t * (p2.y - p1.y) };
        }
        return null;
    }

    function updateIntersectionsCache() {
        if (dirtyIntersections) {
            intersectionsCache = computeAllIntersections();
            dirtyIntersections = false;
        }
    }

    // ==================== 绘图 ====================
    function refreshCanvas() {
        drawCanvas();
        updateRotateCombos();
        updateCircleListbox();
    }
    function drawCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        const cw = canvas.width, ch = canvas.height;
        ctx.clearRect(0, 0, cw, ch);
        // 背景
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, cw, ch);
        // 网格
        const gs = 50 * scale;
        const ox = panOffset[0] % gs, oy = panOffset[1] % gs;
        ctx.strokeStyle = '#d0d0d0';
        ctx.lineWidth = 1;
        for (let x = ox; x < cw; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke(); }
        for (let y = oy; y < ch; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke(); }
        // 罗盘
        const r = 70, cxr = cw - r - 20, cyr = ch - r - 20;
        ctx.strokeStyle = '#7f8c8d';
        ctx.beginPath(); ctx.arc(cxr, cyr, r, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr - r, cyr); ctx.lineTo(cxr + r, cyr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr, cyr - r); ctx.lineTo(cxr, cyr + r); ctx.stroke();
        for (let deg = 0; deg < 360; deg += 45) {
            const rad = toRad(90 - deg);
            const x1 = cxr + (r - 4) * Math.cos(rad), y1 = cyr - (r - 4) * Math.sin(rad);
            const x2 = cxr + r * Math.cos(rad), y2 = cyr - r * Math.sin(rad);
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }
        ctx.font = 'bold 10px Arial';
        ctx.fillStyle = '#2c3e50';
        ['N','E','S','W'].forEach((t,i) => {
            const angles = [0,90,180,270];
            const rad = toRad(90 - angles[i]);
            const tx = cxr + (r + 12) * Math.cos(rad), ty = cyr - (r + 12) * Math.sin(rad);
            ctx.fillStyle = t === 'N' ? '#e74c3c' : '#2c3e50';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(t, tx, ty);
        });
        // 航线
        const edges = getAllEdges();
        edges.forEach(({i1, i2, type}) => {
            const p1 = waypoints[i1], p2 = waypoints[i2];
            const sp1 = worldToScreen(p1.x, p1.y), sp2 = worldToScreen(p2.x, p2.y);
            let color = '#2980b9';
            if (selectedEdges.length >= 1 && ((selectedEdges[0].i1 === i1 && selectedEdges[0].i2 === i2) || (selectedEdges[0].i1 === i2 && selectedEdges[0].i2 === i1))) {
                color = '#e74c3c';
            } else if (selectedEdges.length >= 2 && ((selectedEdges[1].i1 === i1 && selectedEdges[1].i2 === i2) || (selectedEdges[1].i1 === i2 && selectedEdges[1].i2 === i1))) {
                color = '#f1c40f';
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(sp1.x, sp1.y); ctx.lineTo(sp2.x, sp2.y); ctx.stroke();
        });
        // 航点
        waypoints.forEach((wp, i) => {
            const sp = worldToScreen(wp.x, wp.y);
            const color = wp.label === 'H' ? '#e74c3c' : (i === selectedWaypointIndex ? '#f39c12' : '#3498db');
            const rw = (wp.label === 'H' || i === selectedWaypointIndex) ? 14 : 11;
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(sp.x, sp.y, rw, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#2980b9';
            ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#2c3e50';
            ctx.font = `bold ${wp.label === 'H' ? 15 : 13}px Microsoft YaHei`;
            ctx.textAlign = 'center';
            ctx.fillText(wp.label, sp.x, sp.y - 20);
            // 内角标注
            if (waypoints.length >= 3) {
                const prev = waypoints[(i - 1 + waypoints.length) % waypoints.length];
                const next = waypoints[(i + 1) % waypoints.length];
                const ang = calcAngleAtVertex(prev, wp, next);
                ctx.font = '8px Arial';
                ctx.fillStyle = '#2c3e50';
                ctx.fillText(`∠${wp.label}内:${ang.toFixed(1)}°\n外:${(180 - ang).toFixed(1)}°`, sp.x, sp.y + 20);
            }
        });
        // 辅助方向线
        auxDirLines.forEach(dl => {
            const wp = waypoints.find(w => w.label === dl.vertexLabel);
            if (!wp) return;
            const sp = worldToScreen(wp.x, wp.y);
            const rad = toRad(90 - dl.angle);
            const wx = wp.x + 1e6 * Math.cos(rad), wy = wp.y - 1e6 * Math.sin(rad);
            const ep = worldToScreen(wx, wy);
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.beginPath(); ctx.moveTo(sp.x, sp.y); ctx.lineTo(ep.x, ep.y); ctx.stroke();
            ctx.setLineDash([]);
        });
        // 辅助圆
        auxCircles.forEach(c => {
            let center;
            if (c.centerType === 'vertex') center = waypoints.find(w => w.label === c.centerRef);
            else center = auxPoints[c.centerRef];
            if (!center) return;
            const sp = worldToScreen(center.x, center.y);
            const rp = c.radius * scale;
            ctx.strokeStyle = 'green';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 2]);
            ctx.beginPath(); ctx.arc(sp.x, sp.y, rp, 0, Math.PI * 2); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'green';
            ctx.font = 'bold 9px Arial';
            ctx.fillText(`${Math.round(c.radius)}m`, sp.x, sp.y);
        });
        // 交点标记
        if (showIntersections) {
            updateIntersectionsCache();
            intersectionsCache.forEach(pt => {
                const sp = worldToScreen(pt.x, pt.y);
                ctx.strokeStyle = '#2ecc71';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(sp.x - 5, sp.y); ctx.lineTo(sp.x + 5, sp.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(sp.x, sp.y - 5); ctx.lineTo(sp.x, sp.y + 5); ctx.stroke();
            });
        }
        // 辅助点
        auxPoints.forEach((ap, idx) => {
            const sp = worldToScreen(ap.x, ap.y);
            ctx.fillStyle = '#9400d3';
            ctx.beginPath(); ctx.arc(sp.x, sp.y, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#adff2f';
            ctx.font = 'bold 8px Arial';
            ctx.fillText(ap.label, sp.x + 10, sp.y - 10);
            const conn = auxConnections.get(idx) || new Set();
            conn.forEach(wlbl => {
                const wp = waypoints.find(w => w.label === wlbl);
                if (!wp) return;
                const ep = worldToScreen(wp.x, wp.y);
                ctx.strokeStyle = 'orange';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 3]);
                ctx.beginPath(); ctx.moveTo(sp.x, sp.y); ctx.lineTo(ep.x, ep.y); ctx.stroke();
                ctx.setLineDash([]);
                const d = dist(ap.x, ap.y, wp.x, wp.y);
                const az = azimuth(ap.x, ap.y, wp.x, wp.y);
                const mx = (sp.x + ep.x) / 2, my = (sp.y + ep.y) / 2;
                ctx.fillStyle = '#e67e22';
                ctx.font = 'bold 7px Microsoft YaHei';
                ctx.fillText(`${az.toFixed(0)}° ${d.toFixed(1)}m`, mx, my - 8);
            });
        });
        // 状态更新
        updateStatusMessage();
        ctx.fillStyle = 'gray';
        ctx.font = '12px Arial';
        ctx.fillText(`缩放: ${scale.toFixed(2)}x`, cw - 80, ch - 20);
        if (waypoints.length === 0 && auxPoints.length === 0) {
            ctx.fillText('双击画布创建H点\nShift+双击添加辅助点', cw / 2, ch / 2);
        }
    }

    function getAllEdges() {
        const e = [];
        if (waypoints.length >= 2) {
            for (let i = 0; i < waypoints.length - 1; i++) e.push({ i1: i, i2: i + 1, type: '航线' });
            if (autoClose && waypoints.length >= 3) e.push({ i1: waypoints.length - 1, i2: 0, type: '闭合' });
        }
        return e;
    }

    function calcAngleAtVertex(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
        const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y;
        const m1 = Math.hypot(v1.x, v1.y), m2 = Math.hypot(v2.x, v2.y);
        if (m1 === 0 || m2 === 0) return 0;
        return toDeg(Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))));
    }

    // ==================== 交互事件 ====================
    canvas.addEventListener('dblclick', (e) => {
        const pt = screenToWorld(e.offsetX, e.offsetY);
        if (e.shiftKey) {
            addAuxPoint(pt.x, pt.y);
        } else {
            addWaypoint(pt.x, pt.y);
        }
    });
    canvas.addEventListener('mousedown', (e) => {
        const pt = screenToWorld(e.offsetX, e.offsetY);
        // 辅助点
        const auxIdx = getNearbyAux(pt.x, pt.y);
        if (auxIdx >= 0) {
            if (e.shiftKey) {
                if (selectedAuxIndices.includes(auxIdx)) {
                    selectedAuxIndices = selectedAuxIndices.filter(i => i !== auxIdx);
                } else {
                    if (selectedAuxIndices.length >= 2) selectedAuxIndices.shift();
                    selectedAuxIndices.push(auxIdx);
                }
                refreshCanvas();
                return;
            }
            draggingAux = auxIdx;
            selectedAuxIndices = [auxIdx];
            return;
        }
        // 航点
        for (let i = 0; i < waypoints.length; i++) {
            const wp = waypoints[i];
            const r = wp.label === 'H' ? 14 : 11;
            if (dist(pt.x, pt.y, wp.x, wp.y) <= (r + 5) / scale) {
                draggingWaypoint = i;
                selectedWaypointIndex = i;
                refreshCanvas();
                return;
            }
        }
        // 线段选择
        const edges = getAllEdges();
        for (const edge of edges) {
            const p1 = waypoints[edge.i1], p2 = waypoints[edge.i2];
            if (pointToSegmentDist(pt.x, pt.y, p1.x, p1.y, p2.x, p2.y) <= edgeThreshold / scale) {
                const pair = { i1: edge.i1, i2: edge.i2 };
                const exists = selectedEdges.findIndex(e => (e.i1 === pair.i1 && e.i2 === pair.i2) || (e.i1 === pair.i2 && e.i2 === pair.i1));
                if (exists >= 0) {
                    selectedEdges.splice(exists, 1);
                } else {
                    if (selectedEdges.length >= 2) selectedEdges.shift();
                    selectedEdges.push(pair);
                }
                refreshCanvas();
                return;
            }
        }
        selectedEdges = [];
        // 交点吸附
        if (showIntersections) {
            updateIntersectionsCache();
            const th = 10 / scale;
            let minDist = Infinity, closest = null;
            intersectionsCache.forEach(pt => {
                const d = dist(pt.x, pt.y, pt.x, pt.y);
                if (d < minDist) { minDist = d; closest = pt; }
            });
            if (closest && minDist <= th) {
                addWaypoint(closest.x, closest.y, getNextLabel());
                return;
            }
        }
        // 平移
        panning = true;
        panStart = { x: e.offsetX, y: e.offsetY };
    });
    canvas.addEventListener('mousemove', (e) => {
        if (draggingWaypoint != null) {
            const pt = screenToWorld(e.offsetX, e.offsetY);
            waypoints[draggingWaypoint].x = pt.x;
            waypoints[draggingWaypoint].y = pt.y;
            updateAuxConnections();
            refreshCanvas();
        } else if (draggingAux != null) {
            const pt = screenToWorld(e.offsetX, e.offsetY);
            auxPoints[draggingAux].x = pt.x;
            auxPoints[draggingAux].y = pt.y;
            updateAuxConnections();
            refreshCanvas();
        } else if (panning && panStart) {
            const dx = e.offsetX - panStart.x, dy = e.offsetY - panStart.y;
            panOffset[0] += dx; panOffset[1] += dy;
            panStart = { x: e.offsetX, y: e.offsetY };
            refreshCanvas();
        }
    });
    canvas.addEventListener('mouseup', () => {
        if (draggingWaypoint != null) {
            saveState();
            draggingWaypoint = null;
        }
        if (draggingAux != null) {
            draggingAux = null;
        }
        panning = false;
    });
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = scale * factor;
        if (newScale < 0.1 || newScale > 20) return;
        panOffset[0] = e.offsetX - (e.offsetX - panOffset[0]) * (newScale / scale);
        panOffset[1] = e.offsetY - (e.offsetY - panOffset[1]) * (newScale / scale);
        scale = newScale;
        refreshCanvas();
    });
    canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const pt = screenToWorld(e.offsetX, e.offsetY);
        const auxIdx = getNearbyAux(pt.x, pt.y);
        if (auxIdx >= 0) {
            // 辅助点右键菜单
            if (confirm('删除辅助点?')) {
                auxPoints.splice(auxIdx, 1);
                auxConnections.delete(auxIdx);
                refreshCanvas();
            }
            return;
        }
        for (let i = 0; i < waypoints.length; i++) {
            const wp = waypoints[i];
            const r = wp.label === 'H' ? 14 : 11;
            if (dist(pt.x, pt.y, wp.x, wp.y) <= (r + 5) / scale) {
                const action = prompt(`航点 ${wp.label}: 1.删除 2.设为H点 3.辅助圆 4.方向线`, '');
                if (action === '1') deleteWaypoint(i);
                else if (action === '2') { /* 设为H点逻辑省略 */ }
                else if (action === '3') addCircleForVertex(i);
                else if (action === '4') addDirectionLine(i);
                break;
            }
        }
    });
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
        if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
    });

    // ==================== 状态栏 ====================
    function updateStatusMessage() {
        if (selectedEdges.length === 2) {
            const e1 = selectedEdges[0], e2 = selectedEdges[1];
            let common = null;
            if (e1.i1 === e2.i1 || e1.i1 === e2.i2) common = e1.i1;
            else if (e1.i2 === e2.i1 || e1.i2 === e2.i2) common = e1.i2;
            if (common != null) {
                const other1 = (common === e1.i1) ? waypoints[e1.i2] : waypoints[e1.i1];
                const other2 = (common === e2.i1) ? waypoints[e2.i2] : waypoints[e2.i1];
                const ang = calcAngleAtVertex(other1, waypoints[common], other2);
                statusBar.textContent = `两条线段夹角：${ang.toFixed(1)}° (点击状态栏修改)`;
            }
        } else {
            statusBar.textContent = '就绪';
        }
    }
    function modifySelectedAngle() {
        if (selectedEdges.length !== 2) return;
        const e1 = selectedEdges[0], e2 = selectedEdges[1];
        let common = null;
        if (e1.i1 === e2.i1 || e1.i1 === e2.i2) common = e1.i1;
        else if (e1.i2 === e2.i1 || e1.i2 === e2.i2) common = e1.i2;
        if (common == null) return;
        const redOther = (common === e1.i1) ? e1.i2 : e1.i1;
        const yellowOther = (common === e2.i1) ? e2.i2 : e2.i1;
        const curAng = calcAngleAtVertex(waypoints[redOther], waypoints[common], waypoints[yellowOther]);
        const newAng = prompt(`当前内角 ${curAng.toFixed(1)}°，输入新角度（0-180）：`, curAng.toFixed(1));
        if (newAng === null || isNaN(newAng)) return;
        const angle = parseFloat(newAng);
        // 旋转红边
        const pc = waypoints[common];
        const py = waypoints[yellowOther];
        const pr = waypoints[redOther];
        const vy = { x: py.x - pc.x, y: py.y - pc.y };
        const vr = { x: pr.x - pc.x, y: pr.y - pc.y };
        const ly = Math.hypot(vy.x, vy.y), lr = Math.hypot(vr.x, vr.y);
        if (ly === 0 || lr === 0) return;
        const dot = vy.x * vr.x + vy.y * vr.y;
        const cross = vy.x * vr.y - vy.y * vr.x;
        const curRad = Math.atan2(cross, dot);
        const targetRad = (cross >= 0 ? 1 : -1) * toRad(angle);
        const rot = targetRad - curRad;
        const cosR = Math.cos(rot), sinR = Math.sin(rot);
        const newVr = {
            x: vr.x * cosR - vr.y * sinR,
            y: vr.x * sinR + vr.y * cosR
        };
        const vlen = Math.hypot(newVr.x, newVr.y);
        if (vlen > 1e-12) {
            newVr.x *= lr / vlen; newVr.y *= lr / vlen;
        }
        saveState();
        waypoints[redOther].x = pc.x + newVr.x;
        waypoints[redOther].y = pc.y + newVr.y;
        refreshCanvas();
    }

    // ==================== 航线旋转 ====================
    function updateRotateCombos() {
        const startSel = document.getElementById('rotateStart');
        const endSel = document.getElementById('rotateEnd');
        const labels = waypoints.map(w => w.label);
        startSel.innerHTML = endSel.innerHTML = labels.map(l => `<option>${l}</option>`).join('');
    }
    function rotateRoute() {
        const startLabel = document.getElementById('rotateStart').value;
        const endLabel = document.getElementById('rotateEnd').value;
        const target = parseFloat(document.getElementById('rotateTarget').value);
        if (isNaN(target)) return;
        const start = waypoints.find(w => w.label === startLabel);
        const end = waypoints.find(w => w.label === endLabel);
        if (!start || !end) return;
        const curAz = azimuth(start.x, start.y, end.x, end.y);
        const delta = target - curAz;
        const cx = start.x, cy = start.y;
        const rad = toRad(delta);
        const cosA = Math.cos(rad), sinA = Math.sin(rad);
        saveState();
        waypoints.forEach(wp => {
            const dx = wp.x - cx, dy = wp.y - cy;
            wp.x = cx + dx * cosA - dy * sinA;
            wp.y = cy + dx * sinA + dy * cosA;
        });
        refreshCanvas();
    }

    // ==================== 相对坐标编辑器 ====================
    function openRelativeDialog() {
        document.getElementById('relativeModal').style.display = 'block';
        updateBasePointCombo();
    }
    function closeRelativeDialog() {
        document.getElementById('relativeModal').style.display = 'none';
    }
    function updateBasePointCombo() {
        const sel = document.getElementById('basePointSelect');
        sel.innerHTML = waypoints.map(w => `<option>${w.label}</option>`).join('');
    }
    function addWaypointByRelative() {
        const baseLabel = document.getElementById('basePointSelect').value;
        const az = parseFloat(document.getElementById('relAzimuth').value);
        const dist = parseFloat(document.getElementById('relDistance').value);
        const label = document.getElementById('relLabel').value || getNextLabel();
        const bp = waypoints.find(w => w.label === baseLabel);
        if (!bp || isNaN(az) || isNaN(dist)) return;
        const rad = toRad(90 - az);
        const nx = bp.x + dist * Math.cos(rad);
        const ny = bp.y - dist * Math.sin(rad);
        saveState();
        waypoints.push({ x: nx, y: ny, label, params: { height: 100, verticalSpeed: 5, horizontalSpeed: 15, turnMode: '曲线飞行' } });
        closeRelativeDialog();
        refreshCanvas();
    }

    // ==================== 其他 ====================
    function resetView() {
        if (waypoints.length === 0) {
            scale = 1; panOffset = [0, 0];
        } else {
            const xs = waypoints.map(w => w.x), ys = waypoints.map(w => w.y);
            const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
            const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
            const w = maxX - minX + 100, h = maxY - minY + 100;
            const cw = canvas.clientWidth, ch = canvas.clientHeight;
            scale = Math.min(cw / w, ch / h, 2.0);
            scale = Math.max(scale, 0.5);
            panOffset = [cw / 2 - cx * scale, ch / 2 - cy * scale];
        }
        refreshCanvas();
    }
    function updateCircleListbox() {
        const list = document.getElementById('circleList');
        list.innerHTML = auxCircles.map((c, i) => {
            const name = c.centerType === 'vertex' ? `顶点 ${c.centerRef}` : `辅助点 ${auxPoints[c.centerRef]?.label || '?'}`;
            return `<div class="${i === selectedCircleIndex ? 'selected' : ''}">${name} R=${c.radius}m</div>`;
        }).join('');
    }
    let selectedCircleIndex = -1;
    document.getElementById('circleList').addEventListener('click', (e) => {
        const idx = Array.from(e.target.parentNode.children).indexOf(e.target);
        if (idx >= 0) selectedCircleIndex = idx;
    });
    document.getElementById('showIntersectionsCheck').addEventListener('change', (e) => {
        showIntersections = e.target.checked;
        refreshCanvas();
    });

    // 初始化
    saveState();
    refreshCanvas();
</script>
</body>
