<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CAAC 地面站 · 缩放修复版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #2d2d2d;
            --entry: #3c3c3c;
            --fg: #f0f0f0;
            --accent: #0078d7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        #left-panel {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 85%;
            max-width: 380px;
            background: var(--panel);
            padding: 15px;
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            border-right: 1px solid #444;
        }
        #left-panel.open { transform: translateX(0); }
        .panel-close-btn {
            display: block;
            width: 100%;
            background: #ff3b30;
            color: white;
            border: none;
            font-size: 18px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            text-align: center;
        }
        #left-panel h2 { font-size: 1.2rem; margin-bottom: 10px; color: var(--accent); }
        .group {
            background: #252525;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .group label { display: block; margin-bottom: 4px; font-size: 0.9rem; }
        button, select, input[type="number"], input[type="text"] {
            background: var(--entry);
            color: var(--fg);
            border: 1px solid #555;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 1rem;
            margin: 4px 0;
            cursor: pointer;
        }
        button:active { background: var(--accent); }
        .row { display: flex; align-items: center; gap: 5px; margin: 6px 0; flex-wrap: wrap; }
        #canvas-container {
            flex: 1;
            position: relative;
            background: white;
            touch-action: none;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #status-bar {
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            height: 36px;
            background: #2d2d2d;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            padding-left: 15px;
            font-size: 0.95rem;
            cursor: pointer;
            border-top: 1px solid #444;
            z-index: 15;
        }
        #bottom-bar {
            position: absolute;
            bottom: 36px;
            left: 0; right: 0;
            background: rgba(28,28,30,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-top: 1px solid rgba(255,255,255,0.15);
            z-index: 20;
            min-height: 52px;
        }
        #bottom-bar::-webkit-scrollbar { display: none; }
        .tool-btn {
            flex-shrink: 0;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #3c3c3c;
            border: 1px solid #555;
            color: var(--fg);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tool-btn:active { background: var(--accent); }
        .tool-btn.danger { background: #ff3b30; }
        #menuBtn {
            font-size: 1.5rem; padding: 6px 12px;
            border-radius: 8px;
            background: #3c3c3c;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 50%; top: 50%;
            transform: translate(-50%,-50%);
            background: #2d2d2d;
            padding: 20px;
            border: 1px solid #555;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal input[type="number"] { width: 80px; }
        .modal .row { margin: 8px 0; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; }
        select { width: auto; }
        #waypoint-list {
            position: absolute;
            top: 50px; right: 8px;
            width: 140px;
            background: rgba(28,28,30,0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 18;
            display: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--fg);
        }
        #waypoint-list div {
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        #waypoint-list div:active { background: var(--accent); }
    </style>
</head>
<body>
<div id="left-panel">
    <button class="panel-close-btn" onclick="closePanel()">✕ 关闭工具箱</button>
    <h2>操作</h2>
    <div class="group">
        <button onclick="openRelativeDialog()">相对坐标编辑器</button>
        <button onclick="resetView()">重置视图</button>
        <button onclick="deleteSelectedWaypoint()">删除选中航点</button>
        <button onclick="clearAllWaypoints()">删除所有航点</button>
        <label class="checkbox-label">
            <input type="checkbox" id="autoCloseCheck" onchange="toggleAutoClose()"> 自动闭合航线
        </label>
        <button id="auxModeBtn" onclick="toggleAuxMode()">📌 添加辅助点模式</button>
    </div>
    <div class="group">
        <h3>航线旋转</h3>
        <div class="row">
            <label>起始点:</label>
            <select id="rotateStart"></select>
            <label>终点:</label>
            <select id="rotateEnd"></select>
        </div>
        <div class="row">
            <label>目标航向(°):</label>
            <input type="number" id="rotateTarget" value="0" style="width:80px;">
            <button onclick="rotateRoute()">旋转</button>
        </div>
    </div>
    <div class="group">
        <h3>辅助工具</h3>
        <button onclick="clearAllCircles()">清空所有圆</button>
        <div style="height:100px; overflow-y:auto; border:1px solid #555; margin:4px 0; padding:2px;" id="circleList"></div>
        <button onclick="deleteSelectedCircle()">删除选中圆</button>
        <label class="checkbox-label">
            <input type="checkbox" id="showIntersectionsCheck" onchange="refreshCanvas()"> 显示交点 (单击添加)
        </label>
    </div>
    <div style="font-size:0.8rem; color:gray; margin-top:8px;">
        · 双击画布添加航点<br>
        · 长按航点弹出菜单<br>
        · 点击线段可选中测角<br>
        · 底部状态栏点击修改夹角
    </div>
</div>

<div id="canvas-container">
    <canvas id="mainCanvas"></canvas>
    <div id="status-bar" onclick="modifySelectedAngle()">就绪</div>
    <div id="bottom-bar">
        <button class="tool-btn" id="menuBtn" onclick="togglePanel()">☰</button>
        <button class="tool-btn" onclick="undo()">↩</button>
        <button class="tool-btn" onclick="redo()">↪</button>
        <button class="tool-btn" id="addBtn" onclick="toggleAddMode()">＋</button>
        <button class="tool-btn" onclick="openRelativeDialog()">⊕</button>
        <button class="tool-btn" onclick="showWaypointList()">☷</button>
        <button class="tool-btn danger" onclick="clearAllWaypoints()">✕</button>
    </div>
</div>

<div id="relativeModal" class="modal">
    <h3>相对坐标编辑器</h3>
    <div class="row">
        <label>基准点:</label>
        <select id="basePointSelect"></select>
    </div>
    <div class="row">
        <label>方位角(°):</label>
        <input type="number" id="relAzimuth" value="0">
    </div>
    <div class="row">
        <label>距离(米):</label>
        <input type="number" id="relDistance" value="100">
    </div>
    <div class="row">
        <label>新标签:</label>
        <input type="text" id="relLabel" value="">
    </div>
    <button onclick="addWaypointByRelative()">添加航点</button>
    <button onclick="closeRelativeDialog()">关闭</button>
</div>

<div id="waypoint-list"></div>

<script>
    // ==================== 全局状态 ====================
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const statusBar = document.getElementById('status-bar');
    const dpr = window.devicePixelRatio || 1;

    let waypoints = [];
    let selectedWaypointIndex = null;
    let auxPoints = [];
    let auxConnections = new Map();
    let auxCircles = [];
    let auxDirLines = [];
    let scale = 1.0;
    let panOffset = [0, 0];
    let autoClose = false;
    let selectedEdges = [];
    const edgeThreshold = 10;
    let showIntersections = false;
    let dirtyIntersections = true;
    let intersectionsCache = [];
    let history = [];
    let historyIndex = -1;
    let addMode = false;
    let auxMode = false;

    let touchMode = null;
    let lastTapTime = 0;
    let lastTapPos = null;
    let longPressTimer = null;
    let longPressTarget = null;
    // 双指缩放状态
    let pinchStartDist = null;
    let pinchStartScale = 1;
    let pinchCenter = null;       // 两指中心在 canvas CSS 坐标中的位置
    let pinchWorldCenter = null;  // 中心对应的世界坐标
    let draggingWaypointIndex = null;
    let draggingAuxIndex = null;
    let panStart = null;

    // ==================== 工具函数 ====================
    function toRad(deg) { return deg * Math.PI / 180; }
    function toDeg(rad) { return rad * 180 / Math.PI; }
    function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
    function azimuth(x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (Math.abs(dx) < 1e-12 && Math.abs(dy) < 1e-12) return 0;
        return (toDeg(Math.atan2(dx, dy)) + 360) % 360;
    }
    function pointToSegmentDist(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (dx === 0 && dy === 0) return Math.hypot(px - x1, py - y1);
        const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
        return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
    }

    function saveState() {
        const state = JSON.parse(JSON.stringify(waypoints));
        if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1);
        history.push(state);
        historyIndex = history.length - 1;
        if (history.length > 50) { history.shift(); historyIndex--; }
        dirtyIntersections = true;
    }
    function undo() {
        if (historyIndex > 0) {
            historyIndex--;
            waypoints = JSON.parse(JSON.stringify(history[historyIndex]));
            selectedWaypointIndex = null;
            refreshCanvas();
        }
    }
    function redo() {
        if (historyIndex < history.length - 1) {
            historyIndex++;
            waypoints = JSON.parse(JSON.stringify(history[historyIndex]));
            selectedWaypointIndex = null;
            refreshCanvas();
        }
    }

    // 坐标转换：注意 canvas 的 CSS 像素和物理像素已通过 setTransform 对齐，
    // 所以 worldToScreen 和 screenToWorld 都基于 CSS 像素。
    function worldToScreen(wx, wy) {
        return { x: wx * scale + panOffset[0], y: wy * scale + panOffset[1] };
    }
    function screenToWorld(sx, sy) {
        return { x: (sx - panOffset[0]) / scale, y: (sy - panOffset[1]) / scale };
    }

    // ==================== 航点操作 ====================
    function getNextLabel() {
        let maxNum = 0;
        waypoints.forEach(wp => {
            if (wp.label !== 'H') {
                const n = parseInt(wp.label);
                if (!isNaN(n) && n > maxNum) maxNum = n;
            }
        });
        return String(maxNum + 1);
    }

    function addWaypoint(x, y, label) {
        saveState();
        const hasH = waypoints.some(wp => wp.label === 'H');
        const has1 = waypoints.some(wp => wp.label === '1');
        if (!label) label = !hasH ? 'H' : (!has1 ? '1' : getNextLabel());
        waypoints.push({ x, y, label, params: { height: 100, verticalSpeed: 5, horizontalSpeed: 15, turnMode: '曲线飞行' } });
        dirtyIntersections = true;
        refreshCanvas();
    }

    function deleteWaypoint(index) {
        if (index == null || index >= waypoints.length) return;
        if (waypoints[index].label === 'H' && confirm('删除H点会清空所有航点，确定？')) {
            clearAllWaypoints(); return;
        }
        saveState();
        waypoints.splice(index, 1);
        auxConnections.forEach(conn => conn.delete(waypoints[index]?.label));
        selectedWaypointIndex = null;
        refreshCanvas();
    }

    function clearAllWaypoints() {
        if (waypoints.length === 0 || !confirm('确定清空所有航点？')) return;
        saveState();
        waypoints = [];
        auxConnections.forEach(conn => conn.clear());
        refreshCanvas();
    }

    function deleteSelectedWaypoint() { deleteWaypoint(selectedWaypointIndex); }

    function toggleAutoClose() {
        autoClose = document.getElementById('autoCloseCheck').checked;
        refreshCanvas();
    }

    // ==================== 辅助点/圆/方向线 ====================
    function addAuxPoint(x, y) {
        const label = `A${auxPoints.length + 1}`;
        auxPoints.push({ x, y, label });
        auxConnections.set(auxPoints.length - 1, new Set());
        dirtyIntersections = true;
        refreshCanvas();
    }

    function updateAuxConnections() {
        const th = 20 / scale;
        auxPoints.forEach((ap, idx) => {
            const conn = auxConnections.get(idx) || new Set();
            waypoints.forEach(wp => {
                if (!conn.has(wp.label) && dist(ap.x, ap.y, wp.x, wp.y) <= th) conn.add(wp.label);
            });
            auxConnections.set(idx, conn);
        });
        dirtyIntersections = true;
    }

    function getNearbyAux(wx, wy) {
        const th = 20 / scale;
        for (let i = 0; i < auxPoints.length; i++) {
            if (dist(wx, wy, auxPoints[i].x, auxPoints[i].y) <= th) return i;
        }
        return -1;
    }

    function addCircleForVertex(index) {
        const radius = prompt('输入半径（米）:', '100');
        if (!radius || isNaN(radius) || radius <= 0) return;
        auxCircles.push({ centerType: 'vertex', centerRef: waypoints[index].label, radius: parseFloat(radius) });
        dirtyIntersections = true;
        refreshCanvas();
    }

    function addDirectionLine(index) {
        const angle = prompt('输入方向角度（0-360°）:', '315');
        if (angle === null || isNaN(angle)) return;
        auxDirLines.push({ vertexLabel: waypoints[index].label, angle: parseFloat(angle) });
        dirtyIntersections = true;
        refreshCanvas();
    }

    function clearAllCircles() {
        auxCircles = [];
        dirtyIntersections = true;
        refreshCanvas();
    }

    function deleteSelectedCircle() {
        const list = document.getElementById('circleList').children;
        for (let i = 0; i < list.length; i++) {
            if (list[i].classList.contains('selected')) { auxCircles.splice(i, 1); break; }
        }
        dirtyIntersections = true;
        refreshCanvas();
    }

    // ==================== 交点计算 ====================
    function computeAllIntersections() {
        const segs = [];
        if (waypoints.length >= 2) {
            for (let i = 0; i < waypoints.length - 1; i++) {
                segs.push([{ x: waypoints[i].x, y: waypoints[i].y }, { x: waypoints[i + 1].x, y: waypoints[i + 1].y }]);
            }
            if (autoClose && waypoints.length >= 3) {
                segs.push([{ x: waypoints[waypoints.length - 1].x, y: waypoints[waypoints.length - 1].y }, { x: waypoints[0].x, y: waypoints[0].y }]);
            }
        }
        auxConnections.forEach((conn, idx) => {
            const ap = auxPoints[idx];
            conn.forEach(wlbl => {
                const wp = waypoints.find(w => w.label === wlbl);
                if (wp) segs.push([{ x: ap.x, y: ap.y }, { x: wp.x, y: wp.y }]);
            });
        });
        const WORLD_LENGTH = 1e6;
        auxDirLines.forEach(dl => {
            const wp = waypoints.find(w => w.label === dl.vertexLabel);
            if (wp) {
                const rad = toRad(90 - dl.angle);
                const ex = wp.x + WORLD_LENGTH * Math.cos(rad);
                const ey = wp.y - WORLD_LENGTH * Math.sin(rad);
                segs.push([{ x: wp.x, y: wp.y }, { x: ex, y: ey }]);
            }
        });
        const allPts = [];
        auxCircles.forEach(c => {
            let center;
            if (c.centerType === 'vertex') center = waypoints.find(w => w.label === c.centerRef);
            else center = auxPoints[c.centerRef];
            if (!center) return;
            segs.forEach(seg => {
                const pts = lineCircleIntersections(seg[0], seg[1], center, c.radius);
                allPts.push(...pts);
            });
        });
        for (let i = 0; i < segs.length; i++) {
            for (let j = i + 1; j < segs.length; j++) {
                const inter = segmentIntersection(segs[i][0], segs[i][1], segs[j][0], segs[j][1]);
                if (inter) allPts.push(inter);
            }
        }
        const existing = waypoints.map(w => ({ x: w.x, y: w.y }));
        return allPts.filter(pt => !existing.some(e => dist(pt.x, pt.y, e.x, e.y) < 5));
    }

    function lineCircleIntersections(p1, p2, center, radius) { /* 原代码不变 */ return []; }
    function segmentIntersection(p1, p2, p3, p4) { /* 原代码不变 */ return null; }

    // 此处省略了之前重复的完整交点计算函数体，实际使用时需补全上一版本中完整的实现
    // 请把上一版完整代码中的 computeAllIntersections, lineCircleIntersections, segmentIntersection 原样复制过来

    function updateIntersectionsCache() {
        if (dirtyIntersections) {
            intersectionsCache = computeAllIntersections();
            dirtyIntersections = false;
        }
    }

    // ==================== 绘图 ====================
    function refreshCanvas() { drawCanvas(); updateRotateCombos(); updateCircleListbox(); }

    function drawCanvas() {
        const cw = canvas.clientWidth;
        const ch = canvas.clientHeight;
        canvas.width = cw * dpr;
        canvas.height = ch * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);  // 关键：让绘图坐标系与 CSS 像素一致

        ctx.clearRect(0, 0, cw, ch);
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, cw, ch);

        const gs = 50 * scale;
        const ox = panOffset[0] % gs, oy = panOffset[1] % gs;
        ctx.strokeStyle = '#d0d0d0';
        ctx.lineWidth = 1;
        for (let x = ox; x < cw; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke(); }
        for (let y = oy; y < ch; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke(); }

        const r = 50, cxr = cw - r - 15, cyr = r + 15;
        ctx.strokeStyle = '#7f8c8d'; ctx.beginPath(); ctx.arc(cxr, cyr, r, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr-r, cyr); ctx.lineTo(cxr+r, cyr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cxr, cyr-r); ctx.lineTo(cxr, cyr+r); ctx.stroke();
        for (let deg=0; deg<360; deg+=45) {
            const rad = toRad(90-deg);
            ctx.beginPath(); ctx.moveTo(cxr+(r-4)*Math.cos(rad), cyr-(r-4)*Math.sin(rad));
            ctx.lineTo(cxr+r*Math.cos(rad), cyr-r*Math.sin(rad)); ctx.stroke();
        }
        ctx.font = 'bold 12px Arial'; ctx.fillStyle = '#2c3e50';
        ['N','E','S','W'].forEach((t,i) => {
            const angles = [0,90,180,270], rad = toRad(90-angles[i]);
            ctx.fillText(t, cxr+(r+12)*Math.cos(rad), cyr-(r+12)*Math.sin(rad));
        });

        // 绘制航线、航点、辅助元素等（省略，请补全上一版完整代码中的绘制部分）
        // ...

        updateStatusMessage();
        ctx.fillStyle = 'gray'; ctx.font = '12px Arial';
        ctx.fillText(`缩放:${scale.toFixed(2)}x`, cw-70, ch-15);
    }

    // ==================== 触摸事件（全新缩放逻辑） ====================
    function getCanvasTouch(e) {
        const rect = canvas.getBoundingClientRect();
        // 返回相对于 canvas CSS 坐标系的坐标
        return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        // 关闭面板逻辑
        const panel = document.getElementById('left-panel');
        if (panel.classList.contains('open')) {
            const touch = e.touches[0];
            if (!panel.contains(document.elementFromPoint(touch.clientX, touch.clientY))) {
                closePanel();
            }
        }

        if (e.touches.length === 2) {
            // 开始双指缩放
            touchMode = 'pinch';
            const t1 = e.touches[0], t2 = e.touches[1];
            pinchStartDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            pinchStartScale = scale;

            // 计算两指中心在 canvas CSS 坐标系中的位置
            const rect = canvas.getBoundingClientRect();
            const cx = (t1.clientX + t2.clientX) / 2 - rect.left;
            const cy = (t1.clientY + t2.clientY) / 2 - rect.top;
            pinchCenter = { x: cx, y: cy };
            // 记录此时中心点对应的世界坐标
            pinchWorldCenter = screenToWorld(cx, cy);
            return;
        }
        if (touchMode === 'pinch') return;

        const pt = getCanvasTouch(e);
        const world = screenToWorld(pt.x, pt.y);

        // 快速添加模式
        if (addMode) {
            addWaypoint(world.x, world.y);
            addMode = false;
            document.getElementById('addBtn').style.background = '';
            return;
        }
        if (auxMode) {
            addAuxPoint(world.x, world.y);
            auxMode = false;
            document.getElementById('auxModeBtn').style.background = '';
            return;
        }

        clearLongPress();
        // 辅助点拖拽
        const auxIdx = getNearbyAux(world.x, world.y);
        if (auxIdx >= 0) {
            touchMode = 'drag-aux';
            draggingAuxIndex = auxIdx;
            return;
        }
        // 航点拖拽
        for (let i = 0; i < waypoints.length; i++) {
            const wp = waypoints[i];
            if (dist(world.x, world.y, wp.x, wp.y) <= 15 / scale) {
                touchMode = 'drag-waypoint';
                draggingWaypointIndex = i;
                selectedWaypointIndex = i;
                longPressTarget = { type: 'waypoint', index: i };
                startLongPress(e.touches[0]);
                refreshCanvas();
                return;
            }
        }
        // 线段选择
        const edges = getAllEdges();
        for (const edge of edges) {
            if (pointToSegmentDist(world.x, world.y, waypoints[edge.i1].x, waypoints[edge.i1].y, waypoints[edge.i2].x, waypoints[edge.i2].y) <= 12 / scale) {
                toggleEdgeSelection(edge);
                refreshCanvas();
                touchMode = 'idle';
                return;
            }
        }
        // 交点吸附
        if (showIntersections) {
            updateIntersectionsCache();
            for (const inter of intersectionsCache) {
                if (dist(world.x, world.y, inter.x, inter.y) <= 12 / scale) {
                    addWaypoint(inter.x, inter.y);
                    return;
                }
            }
        }
        // 平移
        touchMode = 'pan';
        panStart = { x: pt.x, y: pt.y, offsetX: panOffset[0], offsetY: panOffset[1] };
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (touchMode === 'pinch' && e.touches.length === 2) {
            const t1 = e.touches[0], t2 = e.touches[1];
            const curDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            if (pinchStartDist && pinchCenter && pinchWorldCenter) {
                // 计算新缩放，限制范围
                const factor = curDist / pinchStartDist;
                const newScale = Math.min(20, Math.max(0.1, pinchStartScale * factor));
                // 调整 panOffset，使得 pinchWorldCenter 始终保持在 pinchCenter 位置
                // 公式：pinchCenter.x = pinchWorldCenter.x * newScale + newPanX
                // 所以 newPanX = pinchCenter.x - pinchWorldCenter.x * newScale
                const newPanX = pinchCenter.x - pinchWorldCenter.x * newScale;
                const newPanY = pinchCenter.y - pinchWorldCenter.y * newScale;
                scale = newScale;
                panOffset = [newPanX, newPanY];
                refreshCanvas();
            }
            pinchStartDist = curDist;
            return;
        }
        if (touchMode === 'drag-waypoint' || touchMode === 'drag-aux') {
            const pt = getCanvasTouch(e);
            const world = screenToWorld(pt.x, pt.y);
            if (touchMode === 'drag-waypoint') {
                waypoints[draggingWaypointIndex].x = world.x;
                waypoints[draggingWaypointIndex].y = world.y;
                updateAuxConnections();
            } else {
                auxPoints[draggingAuxIndex].x = world.x;
                auxPoints[draggingAuxIndex].y = world.y;
                updateAuxConnections();
            }
            clearLongPress();
            refreshCanvas();
        } else if (touchMode === 'pan') {
            const pt = getCanvasTouch(e);
            panOffset[0] = panStart.offsetX + (pt.x - panStart.x);
            panOffset[1] = panStart.offsetY + (pt.y - panStart.y);
            refreshCanvas();
        }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        clearLongPress();
        if (touchMode === 'drag-waypoint') saveState();
        if (touchMode === 'pinch') {
            pinchStartDist = null;
            pinchCenter = null;
            pinchWorldCenter = null;
        }
        // 双击检测
        const now = Date.now();
        if (touchMode === 'idle' || touchMode === 'pan') {
            const pt = getCanvasTouch(e);
            if (lastTapPos && Math.abs(pt.x - lastTapPos.x) < 15 && Math.abs(pt.y - lastTapPos.y) < 15 && now - lastTapTime < 300) {
                const world = screenToWorld(pt.x, pt.y);
                addWaypoint(world.x, world.y);
                lastTapTime = 0;
            } else {
                lastTapTime = now;
                lastTapPos = { x: pt.x, y: pt.y };
            }
        }
        touchMode = 'idle';
    });

    // 其余辅助函数（startLongPress, showWaypointMenu, toggleEdgeSelection 等）需保持与上一版一致
    // 请直接复用，不再重复列出。

    // ==================== 初始化 ====================
    saveState();
    refreshCanvas();
</script>
</body>
</html>
